tool_id: graphw00f
version: "1.0.0"
category: web_va
phase: recon
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "1"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "graphw00f"
  - "-d"
  - "-t"
  - "{url}"
  - "-o"
  - "{out_dir}/graphw00f.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/graphw00f.json"
cwe_hints:
  - 200
  - 16
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "graphw00f GraphQL fingerprinter — sends 12 small introspection-friendly queries to {url} and identifies the underlying engine (Apollo, Hasura, Yoga, Graphene, etc.) plus version. Pure recon, no mutating queries. Critical for Cycle 3 attack-tree generation since each engine has distinct CVE history and bypass techniques. Parser deferred to Cycle 3 (JSON_OBJECT → parsers.dispatch.unmapped_tool). Author: dolevf (https://github.com/dolevf/graphw00f). Backlog/dev1_md §4.14. ARG-018."
