tool_id: assetfinder
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 600
cpu_limit: "300m"
memory_limit: "256Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "assetfinder --subs-only {domain} > {out_dir}/assetfinder.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/assetfinder.txt"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
description: "tomnomnom assetfinder passive subdomain discovery; one subdomain per line. Backlog/dev1_md §4.1."
