tool_id: impacket_secretsdump
version: "1.0.0"
category: network
phase: post_exploitation
risk_level: high
requires_approval: true
default_timeout_s: 1800
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: auth-bruteforce
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-network:latest"
command_template:
  - "sh"
  - "-c"
  - "secretsdump.py {domain}/{user}:{pass}@{dc} -outputfile {out_dir}/secrets"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/secrets.ntds"
  - "/out/secrets.sam"
  - "/out/secrets.cached"
cwe_hints:
  - 522
  - 256
  - 200
owasp_wstg:
  - "WSTG-ATHN-06"
  - "WSTG-INFO-08"
description: "Impacket secretsdump.py — DRSUAPI / NTDS / SAM / LSA secret extraction against {dc} using authenticated bind ({domain}/{user}:{pass}). APPROVAL REQUIRED: domain replication touches AD audit trails and produces highly-sensitive credential material. Output is the canonical hashes file ready for §4.13 hashcat -m 1000/1100. Output text-only (parser deferred to Cycle 3). Backlog/dev1_md §4.17. ARG-019."
