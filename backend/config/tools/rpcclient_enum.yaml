tool_id: rpcclient_enum
version: "1.0.0"
category: network
phase: recon
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "300m"
memory_limit: "256Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-smb
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "rpcclient -U '' -N {ip} -c 'enumdomusers; enumdomgroups; querydominfo' > {out_dir}/rpc.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/rpc.txt"
cwe_hints:
  - 200
  - 285
owasp_wstg:
  - "WSTG-INFO-04"
description: "rpcclient null-session enumeration of domain users, groups, and basic domain info via SMB. Backlog/dev1_md §4.2."
