tool_id: scoutsuite
version: "1.0.0"
category: cloud
phase: vuln_analysis
risk_level: medium
requires_approval: true
default_timeout_s: 3600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-cloud:latest"
command_template:
  - "scout"
  - "aws"
  - "--report-dir"
  - "{out_dir}/scoutsuite"
  - "--no-browser"
parse_strategy: json_object
evidence_artifacts:
  - "/out/scoutsuite"
cwe_hints:
  - 16
  - 200
  - 285
  - 732
owasp_wstg:
  - "WSTG-CONF-04"
  - "WSTG-INFO-08"
description: "ScoutSuite multi-cloud posture scan — sweeps AWS services (IAM, S3, EC2, RDS, CloudFront, CloudTrail, ELB, KMS, etc.) via the default-credentials chain. Emits an HTML+JSON report dir under {out_dir}/scoutsuite. Approval-gated: needs live cloud creds and produces meaningful API noise. recon-passive covers AWS TCP/443 endpoints; pin to `cloud-aws` in Cycle 4. Parser deferred to Cycle 3. Author: NCC Group. Backlog §4.15. ARG-018."
