tool_id: subfinder
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 900
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "subfinder"
  - "-d"
  - "{domain}"
  - "-all"
  - "-silent"
  - "-oJ"
  - "-o"
  - "{out_dir}/subfinder.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/subfinder.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
  - "WSTG-INFO-04"
description: "ProjectDiscovery subfinder passive subdomain enumeration via OSINT sources. Backlog/dev1_md §4.1."
