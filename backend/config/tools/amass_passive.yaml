tool_id: amass_passive
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 1200
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "amass"
  - "enum"
  - "-passive"
  - "-d"
  - "{domain}"
  - "-json"
  - "{out_dir}/amass.jsonl"
  - "-timeout"
  - "20"
parse_strategy: json_lines
evidence_artifacts:
  - "/out/amass.jsonl"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
  - "WSTG-INFO-09"
description: "OWASP Amass passive subdomain enumeration via OSINT only; never queries the target's authoritative DNS. Backlog/dev1_md §4.1."
