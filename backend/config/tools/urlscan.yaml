tool_id: urlscan
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 600
cpu_limit: "300m"
memory_limit: "256Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "curl -sS --fail-with-body --max-time 60 -H \"API-Key: ${URLSCAN_API_KEY:?missing}\" -H 'Content-Type: application/json' -X POST 'https://urlscan.io/api/v1/scan/' -d '{\"url\":\"{url}\",\"visibility\":\"unlisted\"}' -o {out_dir}/urlscan.json"
parse_strategy: custom
evidence_artifacts:
  - "/out/urlscan.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-INFO-10"
description: "urlscan.io passive submission of the target URL; rendered DOM/screens fetched out-of-band by orchestrator. Backlog/dev1_md §4.1."
