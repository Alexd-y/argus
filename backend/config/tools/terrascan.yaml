tool_id: terrascan
version: "1.0.0"
category: iac
phase: vuln_analysis
risk_level: passive
requires_approval: false
default_timeout_s: 1200
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers: []
image: "argus-kali-cloud:latest"
command_template:
  - "sh"
  - "-c"
  - "terrascan scan -i terraform -d {path} -o json > {out_dir}/terrascan.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/terrascan.json"
cwe_hints:
  - 16
  - 200
  - 285
  - 311
  - 732
  - 798
owasp_wstg:
  - "WSTG-CONF-04"
  - "WSTG-INFO-08"
description: "Tenable Terrascan IaC scanner — analyses the Terraform module tree at {path} (under /in) using the bundled OPA / Rego policy library (CIS, AWS / Azure / GCP / k8s benchmarks). Fully offline (offline-no-egress) — Terrascan ships its full policy DB inside the image. Wrapped in `sh -c` for stdout redirection. Parser deferred to Cycle 3 (JSON_OBJECT → parsers.dispatch.unmapped_tool). Author: Tenable / Accurics (https://github.com/tenable/terrascan). Backlog/dev1_md §4.16. ARG-018."
