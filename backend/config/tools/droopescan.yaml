tool_id: droopescan
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1200
cpu_limit: "2"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "droopescan"
  - "scan"
  - "--url"
  - "{url}"
  - "--enumerate"
  - "a"
  - "--output"
  - "json"
  - "--threads"
  - "8"
  - "--output-file"
  - "{out_dir}/droopescan.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/droopescan.json"
cwe_hints:
  - 1395
  - 200
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "Droopescan multi-CMS scanner (Drupal/Joomla/SilverStripe/WordPress) — full enumeration (-e a) of versions, themes, modules and users; JSON output, 8 threads. Author: droope (https://github.com/SamJoan/droopescan). Backlog/dev1_md §4.7."
