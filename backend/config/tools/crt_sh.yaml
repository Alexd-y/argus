tool_id: crt_sh
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 300
cpu_limit: "200m"
memory_limit: "128Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "curl -sS --fail-with-body --max-time 60 'https://crt.sh/?q=%25.{domain}&output=json' -o {out_dir}/crtsh.json"
parse_strategy: custom
evidence_artifacts:
  - "/out/crtsh.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
  - "WSTG-INFO-08"
description: "Certificate Transparency lookup via crt.sh; passive subdomain enumeration with no contact to the target. Backlog/dev1_md §4.1."
