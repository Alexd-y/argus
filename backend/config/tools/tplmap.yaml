tool_id: tplmap
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: high
requires_approval: true
default_timeout_s: 900
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "tplmap-runner"
  - "--url"
  - "{url}"
  - "--level"
  - "3"
  - "--os-cmd"
  - "id"
  - "--output"
  - "{out_dir}/tplmap.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/tplmap.txt"
cwe_hints:
  - 1336
  - 94
  - 78
owasp_wstg:
  - "WSTG-INPV-18"
description: "tplmap SSTI probe — /usr/local/bin/tplmap-runner wraps upstream tplmap.py (interactive-first), fires --level 3 detection + --os-cmd 'id' confirmation against {url}, writes stdout/stderr to {out_dir}/tplmap.txt. APPROVAL REQUIRED: --os-cmd id is an actual RCE attempt on confirmed engine fingerprint. Parsing deferred to Cycle 3 (TEXT_LINES → parsers.dispatch.unmapped_tool). Author: epinna (https://github.com/epinna/tplmap). Backlog/dev1_md §4.9. ARG-016."
