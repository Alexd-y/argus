tool_id: ssl_enum_ciphers
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: tls-handshake
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "nmap"
  - "--script"
  - "ssl-enum-ciphers"
  - "-p"
  - "{port}"
  - "{host}"
  - "-oX"
  - "{out_dir}/ssl_ciphers.xml"
parse_strategy: xml_nmap
evidence_artifacts:
  - "/out/ssl_ciphers.xml"
cwe_hints:
  - 326
  - 327
owasp_wstg:
  - "WSTG-CRYP-01"
description: "Nmap NSE ssl-enum-ciphers script: per-protocol cipher table with strength grades. Backlog/dev1_md §4.3."
