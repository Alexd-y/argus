tool_id: nmap_udp
version: "1.0.0"
category: network
phase: recon
risk_level: low
requires_approval: false
default_timeout_s: 3600
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-udp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "nmap"
  - "-sU"
  - "--top-ports"
  - "100"
  - "-oX"
  - "{out_dir}/nmap_udp.xml"
  - "{ip}"
parse_strategy: xml_nmap
evidence_artifacts:
  - "/out/nmap_udp.xml"
cwe_hints:
  - 200
  - 668
owasp_wstg:
  - "WSTG-INFO-02"
description: "Nmap UDP scan across the 100 most common UDP ports; complements TCP discovery. Backlog/dev1_md §4.2."
