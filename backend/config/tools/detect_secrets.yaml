tool_id: detect_secrets
version: "1.0.0"
category: misc
phase: vuln_analysis
risk_level: passive
requires_approval: false
default_timeout_s: 1200
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers: []
image: "argus-kali-cloud:latest"
command_template:
  - "sh"
  - "-c"
  - "detect-secrets scan {path} > {out_dir}/detect-secrets.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/detect-secrets.json"
cwe_hints:
  - 200
  - 312
  - 522
  - 798
owasp_wstg:
  - "WSTG-ATHN-06"
  - "WSTG-INFO-08"
description: "Yelp detect-secrets entropy + plugin-based secret scanner — analyses the source tree at {path} (/in) using AWS/Azure/Slack/GitHub/Stripe/NPM/private-key plugins plus Shannon-entropy heuristics. Designed to seed a baseline (.secrets.baseline) so later runs flag only NEW leaks; this descriptor emits raw scan JSON for downstream baseline diffing. Fully offline (offline-no-egress). `sh -c` is used solely for stdout redirection. Parser deferred to Cycle 3. Author: Yelp. Backlog §4.16. ARG-018."
