tool_id: xsser
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "xsser"
  - "-u"
  - "{url}"
  - "--auto"
  - "--no-color"
  - "--Json"
  - "{out_dir}/xsser.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/xsser.json"
cwe_hints:
  - 79
  - 80
owasp_wstg:
  - "WSTG-INPV-01"
  - "WSTG-INPV-02"
description: "xsser OWASP Cross-Site Scripter — runs --auto mode (default vector chain) against {url} with JSON report emitted to {out_dir}/xsser.json. Approval-free passive payload tester (no auto-RCE / DOM-write side effects). Parsing deferred to Cycle 3 (JSON_OBJECT strategy → parsers.dispatch.unmapped_tool warning until then). Author: epsylon (https://github.com/epsylon/xsser). Backlog/dev1_md §4.10. ARG-016."
