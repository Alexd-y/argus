tool_id: wfuzz
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "wfuzz"
  - "-c"
  - "-z"
  - "file,{wordlist}"
  - "--hc"
  - "404"
  - "-o"
  - "json"
  - "-f"
  - "{out_dir}/wfuzz.json,json"
  - "{url}/FUZZ"
parse_strategy: json_object
evidence_artifacts:
  - "/out/wfuzz.json"
cwe_hints:
  - 200
owasp_wstg:
  - "WSTG-INPV-04"
description: "wfuzz HTTP parameter / path fuzzer with 404 hidden. Stdout printer (-o json) and file printer suffix (-f path,json) both forced to JSON so the file is real JSON, not raw text. Author: Xavi Mendez (https://github.com/xmendez/wfuzz). Backlog/dev1_md §4.5."
