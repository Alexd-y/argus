tool_id: testssl
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1800
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: tls-handshake
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "testssl.sh"
  - "--jsonfile"
  - "{out_dir}/testssl.json"
  - "--severity"
  - "LOW"
  - "{host}:{port}"
parse_strategy: json_object
evidence_artifacts:
  - "/out/testssl.json"
cwe_hints:
  - 326
  - 327
  - 295
owasp_wstg:
  - "WSTG-CRYP-01"
  - "WSTG-CRYP-02"
  - "WSTG-CRYP-03"
description: "testssl.sh comprehensive TLS/SSL configuration audit (ciphers, protocols, vulns) with JSON severity-tagged output. Backlog/dev1_md §4.3."
