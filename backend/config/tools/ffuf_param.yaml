tool_id: ffuf_param
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "ffuf"
  - "-u"
  - "{url}?FUZZ=test"
  - "-w"
  - "{wordlist}"
  - "-mc"
  - "all"
  - "-fs"
  - "{size}"
  - "-o"
  - "{out_dir}/ffuf_param.json"
  - "-of"
  - "json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/ffuf_param.json"
cwe_hints:
  - 200
owasp_wstg:
  - "WSTG-INPV-04"
description: "ffuf GET parameter discovery via FUZZ=test injection. Caller MUST pass {size} as the baseline response size in bytes; -fs filters that size out. Author: ffuf project. Backlog/dev1_md §4.5."
