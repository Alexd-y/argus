tool_id: clairvoyance
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1800
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "clairvoyance"
  - "{url}/graphql"
  - "-o"
  - "{out_dir}/clairvoyance.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/clairvoyance.json"
cwe_hints:
  - 200
  - 285
  - 862
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "clairvoyance GraphQL field-suggestion oracle — reconstructs the schema (fields, types, args) of {url}/graphql even when introspection is disabled, by exploiting the field-suggestion mechanism. Reveals hidden mutations and admin endpoints. Read-only, never mutates. Output is the inferred JSON schema. Parser deferred to Cycle 3 (JSON_OBJECT → unmapped_tool). Author: nikitastupin. Backlog §4.14. ARG-018."
