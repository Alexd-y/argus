tool_id: apktool
version: "1.0.0"
category: binary
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 900
cpu_limit: "1"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-binary:latest"
command_template:
  - "sh"
  - "-c"
  - "apktool d -f -o {out_dir}/apktool {binary} 2>&1 | tee {out_dir}/apktool.log"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/apktool.log"
  - "/out/apktool"
cwe_hints:
  - 200
  - 312
owasp_wstg:
  - "WSTG-INFO-08"
description: "Apktool — Android APK reverse-engineering. Decompiles {binary} into smali + AndroidManifest.xml + resources tree at /out/apktool/. -f overwrites stale extraction; the resulting smali tree is the input for §4.18 jadx (full Java decompile) and any operator-driven dynamic dataset. Pure offline (egress blocked). Output text-only (parser deferred to Cycle 3). Backlog/dev1_md §4.18. ARG-019."
