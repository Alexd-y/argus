tool_id: magescan
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 900
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "magescan"
  - "scan:all"
  - "{url}"
  - "--format=json"
  - "--no-ansi"
  - "--quiet"
parse_strategy: text_lines
evidence_artifacts: []
cwe_hints:
  - 1395
  - 200
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "MageScan Magento e-commerce security scanner — scan:all surface (version, modules, patches, sitemap, admin path); JSON output on stdout, kept text-only in Cycle 2 since the schema is shop-dependent (parser deferred to Cycle 3). Author: Steve Robbins (https://github.com/steverobbins/magescan). Backlog/dev1_md §4.7."
