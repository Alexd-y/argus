tool_id: crackmapexec
version: "1.0.0"
category: auth
phase: exploitation
risk_level: high
requires_approval: true
default_timeout_s: 1800
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: auth-bruteforce
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-network:latest"
command_template:
  - "sh"
  - "-c"
  - "crackmapexec smb {host} -u {user} -p {pass} --shares > {out_dir}/cme.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/cme.txt"
cwe_hints:
  - 287
  - 307
  - 522
owasp_wstg:
  - "WSTG-ATHN-01"
  - "WSTG-ATHN-04"
description: "CrackMapExec (CME) — Active Directory / SMB credential validator + share enumerator. APPROVAL REQUIRED: validating creds against domain controllers triggers Windows lockout policies. Single (user, pass) tuple per run; --shares lists accessible SMB shares. Output text-only (full parser deferred to Cycle 3). Backlog/dev1_md §4.12. ARG-017."
