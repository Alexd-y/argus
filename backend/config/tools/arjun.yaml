tool_id: arjun
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "arjun"
  - "-u"
  - "{url}"
  - "-oJ"
  - "{out_dir}/arjun.json"
  - "-m"
  - "GET,POST"
parse_strategy: json_object
evidence_artifacts:
  - "/out/arjun.json"
cwe_hints:
  - 200
owasp_wstg:
  - "WSTG-INPV-04"
description: "arjun HTTP parameter discovery via reflection / behaviour analysis. Author: s0md3v (https://github.com/s0md3v/Arjun). Backlog/dev1_md §4.5."
