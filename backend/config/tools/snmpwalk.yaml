tool_id: snmpwalk
version: "1.0.0"
category: network
phase: recon
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: auth-bruteforce
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-network:latest"
command_template:
  - "sh"
  - "-c"
  - "snmpwalk -v 2c -c {community} -t 5 -r 2 {host} > {out_dir}/snmpwalk.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/snmpwalk.txt"
cwe_hints:
  - 200
  - 521
owasp_wstg:
  - "WSTG-INFO-09"
description: "Net-SNMP snmpwalk — full SNMPv2c MIB walk against {host} using {community}. Read-only GETNEXT sweep (-t 5 -r 2 keeps the agent within typical timeout budgets). Surfaces interface tables, ARP / route / process inventories on weakly-configured devices that ship with default community strings (public/private). Output text-only (parser deferred to Cycle 3). Backlog/dev1_md §4.17. ARG-019."
