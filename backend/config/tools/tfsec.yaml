tool_id: tfsec
version: "1.0.0"
category: iac
phase: vuln_analysis
risk_level: passive
requires_approval: false
default_timeout_s: 1200
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers: []
image: "argus-kali-cloud:latest"
command_template:
  - "sh"
  - "-c"
  - "tfsec {path} --format json --soft-fail > {out_dir}/tfsec.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/tfsec.json"
cwe_hints:
  - 16
  - 200
  - 285
  - 311
  - 732
  - 798
owasp_wstg:
  - "WSTG-CONF-04"
  - "WSTG-INFO-08"
description: "Aqua tfsec Terraform static analyser — scans the Terraform module tree at {path} with the bundled rule set (AWS/Azure/GCP/GitHub/Cloudflare/K8s/DO providers). --soft-fail keeps exit-code 0 so the sandbox driver never marks a successful scan as failure on policy hits. Fully offline (offline-no-egress); rules are in-image. `sh -c` is used solely for stdout redirection. Parser deferred to Cycle 3. Author: Aqua. Backlog §4.16. ARG-018."
