tool_id: cloudsploit
version: "1.0.0"
category: cloud
phase: vuln_analysis
risk_level: medium
requires_approval: true
default_timeout_s: 3600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-cloud:latest"
command_template:
  - "cloudsploit"
  - "scan"
  - "--config"
  - "{path}"
  - "--json"
  - "{out_dir}/cloudsploit.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/cloudsploit.json"
cwe_hints:
  - 16
  - 200
  - 285
  - 732
owasp_wstg:
  - "WSTG-CONF-04"
  - "WSTG-INFO-08"
description: "Aqua CloudSploit multi-cloud posture scan — operator config bundle at {path} (JS wiring AWS profile/regions/output prefs) drives the scan. Approval-gated: read-only scans still inventory live cloud APIs and may surface sensitive metadata. Output: single JSON document. recon-passive = broad TCP/443 to AWS APIs; production should pin `cloud-aws` (Cycle 4). Parser deferred to Cycle 3. Author: Aqua Security. Backlog §4.15. ARG-018."
