tool_id: joomscan
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1200
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "joomscan"
  - "--url"
  - "{url}"
  - "--ec"
  - "--report"
  - "{out_dir}/joomscan.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/joomscan.txt"
cwe_hints:
  - 1395
  - 200
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "OWASP JoomScan Joomla security scanner — enumerates components (--ec), vulnerable extensions, configuration leaks; emits text-only report. Author: OWASP JoomScan project (https://github.com/OWASP/joomscan). Backlog/dev1_md §4.7."
