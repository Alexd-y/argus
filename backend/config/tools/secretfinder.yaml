tool_id: secretfinder
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: passive
requires_approval: false
default_timeout_s: 300
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "secretfinder-wrapper"
  - "-i"
  - "{in_dir}/js.txt"
  - "-o"
  - "cli"
  - "-out"
  - "{out_dir}/secretfinder.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/secretfinder.txt"
cwe_hints:
  - 200
owasp_wstg:
  - "WSTG-INFO-05"
  - "WSTG-CRYP-03"
description: "SecretFinder scans JavaScript bundles listed in `{in_dir}/js.txt` for hard-coded API keys, tokens and credentials. Image-side wrapper `secretfinder-wrapper` translates argv-form (`-i <js.txt> -o cli -out <path>`) to upstream invocation and coerces SecretFinder's HTML output → one secret per line at `/out/secretfinder.txt` so the sandbox stays argv-only. Full secret regex extraction parser ships in Cycle 3. Author: m4ll0k (https://github.com/m4ll0k/SecretFinder). Backlog/dev1_md §4.6."
