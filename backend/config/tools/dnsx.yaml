tool_id: dnsx
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 1200
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "dnsx"
  - "-l"
  - "{in_dir}/subs.txt"
  - "-a"
  - "-aaaa"
  - "-cname"
  - "-mx"
  - "-ns"
  - "-txt"
  - "-resp"
  - "-json"
  - "-o"
  - "{out_dir}/dnsx.json"
parse_strategy: json_lines
evidence_artifacts:
  - "/out/dnsx.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
  - "WSTG-INFO-02"
description: "ProjectDiscovery dnsx fast DNS resolver for A/AAAA/CNAME/MX/NS/TXT records over public resolvers. Backlog/dev1_md §4.1."
