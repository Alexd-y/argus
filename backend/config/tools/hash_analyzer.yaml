tool_id: hash_analyzer
version: "1.0.0"
category: misc
phase: post_exploitation
risk_level: low
requires_approval: false
default_timeout_s: 300
cpu_limit: "500m"
memory_limit: "256Mi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers: []
image: "argus-kali-cloud:latest"
command_template:
  - "sh"
  - "-c"
  - "hash-analyzer --in {hashes_file} --json > {out_dir}/hash_analyzer.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/hash_analyzer.json"
cwe_hints:
  - 326
  - 327
owasp_wstg:
  - "WSTG-CRYP-04"
description: "hash-analyzer — extended hash classification (HMAC, salts, encoding chains). Runs offline (offline-no-egress policy). Reads hashes from {hashes_file} (must live under /in/), emits JSON with algorithm guess + entropy stats; complements §4.13 hashid for ambiguous prefixes. Output JSON (parser deferred to Cycle 3). Backlog/dev1_md §4.13. ARG-017."
