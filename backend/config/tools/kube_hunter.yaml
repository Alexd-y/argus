tool_id: kube_hunter
version: "1.0.0"
category: cloud
phase: vuln_analysis
risk_level: medium
requires_approval: true
default_timeout_s: 1800
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-cloud:latest"
command_template:
  - "sh"
  - "-c"
  - "kube-hunter --remote {host} --report json --log none > {out_dir}/kubehunter.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/kubehunter.json"
cwe_hints:
  - 16
  - 200
  - 285
  - 287
  - 668
owasp_wstg:
  - "WSTG-CONF-04"
  - "WSTG-INFO-08"
  - "WSTG-ATHN-01"
description: "Aqua kube-hunter remote Kubernetes attack-surface scanner — sends a fixed catalogue of safe probes (open API server, exposed dashboards, etcd/kubelet ports, default service-account tokens, anonymous auth) at the cluster reachable from {host}. Approval-gated, risk=medium: an *active* scan that issues real HTTP requests against the K8s control plane and may trip IDS/audit alerts. `sh -c` is used solely for stdout redirection. Parser deferred to Cycle 3. Author: Aqua. Backlog §4.15. ARG-018."
