tool_id: spring_boot_actuator
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "nuclei"
  - "-target"
  - "{url}"
  - "-tags"
  - "springboot,actuator"
  - "-severity"
  - "info,low,medium,high,critical"
  - "-jsonl"
  - "-output"
  - "{out_dir}/spring_boot_actuator.jsonl"
  - "-disable-update-check"
  - "-no-color"
  - "-rate-limit"
  - "50"
  - "-c"
  - "10"
  - "-stats"
parse_strategy: nuclei_jsonl
evidence_artifacts:
  - "/out/spring_boot_actuator.jsonl"
cwe_hints:
  - 200
  - 16
  - 287
owasp_wstg:
  - "WSTG-CONF-04"
  - "WSTG-INFO-08"
  - "WSTG-ATHN-01"
description: "Spring Boot Actuator exposure check — runs nuclei with `springboot,actuator` tags against {url}. Surfaces unauthenticated /actuator/* endpoints (env, heapdump, mappings, jolokia RCE chains). Parser handled by ARG-015 (nuclei_jsonl strategy). Backlog/dev1_md §4.7. Templates: https://github.com/projectdiscovery/nuclei-templates"
