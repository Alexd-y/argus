tool_id: graphql_cop
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 900
cpu_limit: "1"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "sh"
  - "-c"
  - "graphql-cop -t {url}/graphql -o json > {out_dir}/graphqlcop.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/graphqlcop.json"
cwe_hints:
  - 200
  - 285
  - 770
  - 1284
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "graphql-cop GraphQL security audit — runs ~15 safety checks against {url}/graphql (introspection on, field suggestions, alias-based DoS, batch queries, GET-based mutation, missing CSRF, etc.) and emits a JSON report. Non-destructive, sends only benign reflection queries. `sh -c` is used solely to redirect stdout to {out_dir}; templating keeps everything argv-only. Parser deferred to Cycle 3. Author: dolevf. Backlog §4.14. ARG-018."
