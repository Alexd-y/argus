tool_id: github_search
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 600
cpu_limit: "300m"
memory_limit: "256Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "gh api -X GET search/code -f q=org:{org} > {out_dir}/github_search.json"
parse_strategy: custom
evidence_artifacts:
  - "/out/github_search.json"
cwe_hints:
  - 200
  - 540
owasp_wstg:
  - "WSTG-INFO-03"
description: "GitHub code search for accidental secret/key leaks within the target organisation. Requires GITHUB_TOKEN env in the sandbox. Backlog/dev1_md §4.1."
