tool_id: mobsf_api
version: "1.0.0"
category: binary
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1800
cpu_limit: "2"
memory_limit: "4Gi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-binary:latest"
command_template:
  - "sh"
  - "-c"
  - "mobsf-cli --apk {binary} --output {out_dir}/mobsf.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/mobsf.json"
cwe_hints:
  - 250
  - 312
  - 502
  - 798
owasp_wstg:
  - "WSTG-INFO-08"
description: "Mobile Security Framework (MoBSF) CLI — static analysis of an Android APK / iOS IPA binary loaded from {binary} (sandbox-rooted /in/-prefixed path). Decompiles bytecode, walks AndroidManifest / Info.plist, runs the MoBSF rule pack, and emits a JSON report. Pure offline analysis — egress fully blocked. Parser deferred to Cycle 3. Backlog/dev1_md §4.18. ARG-019."
