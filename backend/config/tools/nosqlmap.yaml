tool_id: nosqlmap
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: medium
requires_approval: true
default_timeout_s: 900
cpu_limit: "1"
memory_limit: "1Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "nosqlmap-runner"
  - "--target"
  - "{url}"
  - "--attack"
  - "2"
  - "--output"
  - "{out_dir}/nosqlmap.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/nosqlmap.txt"
cwe_hints:
  - 943
  - 89
owasp_wstg:
  - "WSTG-INPV-05"
description: "NoSQLMap Mongo/CouchDB injection probe — /usr/local/bin/nosqlmap-runner wraps upstream nosqlmap.py (menu-driven, driven non-interactively), runs attack profile 2 (NoSQLi enum) against {url}, captures stdout to {out_dir}/nosqlmap.txt. APPROVAL REQUIRED: fires NoSQLi payloads, attempts auth-bypass, enumerates collections. Parsing deferred to Cycle 3 (TEXT_LINES → parsers.dispatch.unmapped_tool). Author: codingo (https://github.com/codingo/NoSQLMap). Backlog/dev1_md §4.9. ARG-016."
