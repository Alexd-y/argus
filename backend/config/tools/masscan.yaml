tool_id: masscan
version: "1.0.0"
category: network
phase: recon
risk_level: low
requires_approval: false
default_timeout_s: 3600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "masscan"
  - "-p1-65535"
  - "--rate"
  - "10000"
  - "-oJ"
  - "{out_dir}/masscan.json"
  - "{cidr}"
parse_strategy: json_object
evidence_artifacts:
  - "/out/masscan.json"
cwe_hints:
  - 200
  - 668
owasp_wstg:
  - "WSTG-INFO-02"
description: "masscan high-speed TCP port discovery across the in-scope CIDR; rate-limited to stay below 10k pps. Backlog/dev1_md §4.2."
