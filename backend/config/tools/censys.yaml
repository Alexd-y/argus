tool_id: censys
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 600
cpu_limit: "300m"
memory_limit: "256Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "censys search 'services.tls.certificates.leaf_data.names:{domain}' -o {out_dir}/censys.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/censys.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
  - "WSTG-INFO-04"
description: "Censys CLI passive search for hosts with TLS certs covering the target domain. Requires CENSYS_API_ID and CENSYS_API_SECRET. Backlog/dev1_md §4.1."
