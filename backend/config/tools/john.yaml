tool_id: john
version: "1.0.0"
category: misc
phase: post_exploitation
risk_level: high
requires_approval: true
default_timeout_s: 7200
cpu_limit: "4"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: offline-no-egress
  egress_allowlist: []
  dns_resolvers: []
image: "argus-kali-cloud:latest"
command_template:
  - "sh"
  - "-c"
  - "john --format={fmt} --wordlist={wordlist} {hashes_file} && john --show {hashes_file} > {out_dir}/john.txt"
parse_strategy: text_lines
evidence_artifacts:
  - "/out/john.txt"
cwe_hints:
  - 916
  - 326
  - 522
owasp_wstg:
  - "WSTG-CRYP-04"
description: "John the Ripper — offline hash cracker. APPROVAL REQUIRED: long-running and CPU-bound; runs FULLY OFFLINE (offline-no-egress policy). --format={fmt} selects the hash type (e.g. nt, raw-md5, sha256crypt, krb5tgs), --wordlist scans through {wordlist}, then --show prints cracked plaintexts. Hashes from {hashes_file} (must live under /in/). Output text-only (full parser deferred to Cycle 3). Backlog/dev1_md §4.13. ARG-017."
