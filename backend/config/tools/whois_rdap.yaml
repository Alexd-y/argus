tool_id: whois_rdap
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 300
cpu_limit: "200m"
memory_limit: "128Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "sh"
  - "-c"
  - "whois {domain} > {out_dir}/whois.txt ; curl -sS --fail-with-body --max-time 30 https://rdap.org/domain/{domain} -o {out_dir}/rdap.json"
parse_strategy: custom
evidence_artifacts:
  - "/out/whois.txt"
  - "/out/rdap.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
description: "Combined classic WHOIS + RFC 9082 RDAP lookup for registrant, NS, and contact metadata. Backlog/dev1_md §4.1."
