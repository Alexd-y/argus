tool_id: interactsh_client
version: "1.0.0"
category: oast
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1800
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: oast-egress
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "interactsh-client"
  - "-server"
  - "https://oast.argus.local"
  - "-json"
  - "-o"
  - "{out_dir}/interactsh.jsonl"
  - "-v"
parse_strategy: json_lines
evidence_artifacts:
  - "/out/interactsh.jsonl"
cwe_hints:
  - 918
owasp_wstg:
  - "WSTG-INPV-19"
description: "interactsh-client polls the ARGUS OAST plane for OOB callbacks (DNS / HTTP / SMTP) generated by SSRF / blind-RCE / SSTI payloads. JSONL output piped through sandbox/parsers/interactsh_parser.py — every callback becomes a SSRF (HTTP/SMTP=CONFIRMED) or INFO (DNS=LIKELY) finding with raw-request / raw-response evidence. Backlog/dev1_md §4.11. ARG-017."
