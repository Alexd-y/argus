tool_id: ffuf_dir
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 600
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "ffuf"
  - "-u"
  - "{url}/FUZZ"
  - "-w"
  - "{wordlist}"
  - "-mc"
  - "200,204,301,302,307,401,403"
  - "-recursion"
  - "-recursion-depth"
  - "2"
  - "-o"
  - "{out_dir}/ffuf_dir.json"
  - "-of"
  - "json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/ffuf_dir.json"
cwe_hints:
  - 200
owasp_wstg:
  - "WSTG-CONFIG-04"
  - "WSTG-CONFIG-06"
description: "ffuf directory / file content discovery with recursion depth 2. Author: ffuf project (https://github.com/ffuf/ffuf). Backlog/dev1_md §4.5."
