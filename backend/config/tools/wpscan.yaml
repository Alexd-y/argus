tool_id: wpscan
version: "1.0.0"
category: web_va
phase: vuln_analysis
risk_level: low
requires_approval: false
default_timeout_s: 1800
cpu_limit: "2"
memory_limit: "2Gi"
seccomp_profile: runtime/default
network_policy:
  name: recon-active-tcp
  egress_allowlist: []
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-web:latest"
command_template:
  - "wpscan"
  - "--url"
  - "{url}"
  - "--enumerate"
  - "vp,vt,u"
  - "--random-user-agent"
  - "--detection-mode"
  - "mixed"
  - "--no-banner"
  - "--no-update"
  - "--disable-tls-checks"
  - "--format"
  - "json"
  - "--output"
  - "{out_dir}/wpscan.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/wpscan.json"
cwe_hints:
  - 1395
  - 200
owasp_wstg:
  - "WSTG-INFO-08"
  - "WSTG-CONF-04"
description: "WPScan WordPress security scanner — enumerates vulnerable plugins/themes (vp,vt) and users (u), random UA, mixed (passive+aggressive) detection. Reads optional WPSCAN_API_TOKEN from sandbox env for CVE / WPVulnDB lookups. Author: WPScan team (https://github.com/wpscanteam/wpscan). Backlog/dev1_md §4.7. §4.7 backlog narrows enumeration scope: vp,vt retained, u added (parser handles users[*] first-class), tt/cb/dbe omitted (timthumb deprecated since 2014, cb/dbe noisy and rarely actionable)."
