tool_id: fierce
version: "1.0.0"
category: recon
phase: recon
risk_level: passive
requires_approval: false
default_timeout_s: 1200
cpu_limit: "500m"
memory_limit: "512Mi"
seccomp_profile: runtime/default
network_policy:
  name: recon-passive
  egress_allowlist:
    - "0.0.0.0/0"
  dns_resolvers:
    - "1.1.1.1"
    - "9.9.9.9"
image: "argus-kali-recon:latest"
command_template:
  - "fierce"
  - "--domain"
  - "{domain}"
  - "--json"
  - "{out_dir}/fierce.json"
parse_strategy: json_object
evidence_artifacts:
  - "/out/fierce.json"
cwe_hints: []
owasp_wstg:
  - "WSTG-INFO-01"
  - "WSTG-INFO-02"
description: "fierce DNS recon walking adjacent IPs and brute-forcing hostnames within the target domain. Backlog/dev1_md §4.1."
