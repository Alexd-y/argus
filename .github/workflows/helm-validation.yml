# ──────────────────────────────────────────────────────────────────────────────
# T07 (Cycle 6 Batch 1) — Helm chart kubeconform schema validation gate.
# ──────────────────────────────────────────────────────────────────────────────
#
# Closes ISS-cycle6-carry-over.md §"Known limitations carry-over" item #7
# ("Helm chart kubeconform schema validation в CI"). The pre-existing
# `helm-lint` job in `ci.yml` runs kubeconform conditionally against ONE
# Kubernetes version and ONLY the prod overlay; this workflow hardens that
# coverage by:
#
#   * pinning kubeconform v0.6.7 (matches ci.yml; never `:latest`);
#   * matrix-validating against the chart's `kubeVersion: ">=1.27.0-0"` floor
#     plus two production-relevant API levels (1.29 LTS-ish, 1.31 latest);
#   * rendering ALL three overlays (dev / staging / prod) instead of prod
#     only — drift in dev/staging values blocks promotion before it lands;
#   * emitting `--output json` so the job summary parses a digest table
#     instead of grepping human-readable text;
#   * failing the build on ANY validation error (no advisory mode).
#
# The validation logic lives in `infra/scripts/helm_kubeconform.sh` so devs
# can run the same pipeline locally (`bash infra/scripts/helm_kubeconform.sh`
# or the PowerShell twin). Keeping the script as the source of truth avoids
# CI-vs-local drift documented as a recurring pain in earlier cycles
# (see ai_docs/develop/troubleshooting/mypy-windows-access-violation.md).
#
# Path filters scope the workflow to chart + workflow changes only — the
# average PR (backend / Frontend code) skips the gate entirely. Schema
# downloads are not cached; for three matrix legs the cold cost is ≤30s.

name: Helm chart kubeconform

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "infra/helm/argus/**"
      - "infra/scripts/helm_kubeconform.sh"
      - "infra/scripts/helm_kubeconform.ps1"
      - ".github/workflows/helm-validation.yml"
  push:
    branches: [main]
    paths:
      - "infra/helm/argus/**"
      - "infra/scripts/helm_kubeconform.sh"
      - "infra/scripts/helm_kubeconform.ps1"
      - ".github/workflows/helm-validation.yml"
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: "Single K8s version to validate (overrides matrix; e.g. 1.30.4)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: helm-validation-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  kubeconform:
    name: kubeconform (k8s ${{ matrix.kube_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # Validate against every leg even if one fails — operators want the
      # full surface (e.g. a deprecation that hits 1.31 only, while 1.27
      # passes) in one CI run, not via repeated PR pushes.
      fail-fast: false
      matrix:
        # Floor matches Chart.yaml::kubeVersion (>=1.27.0-0); 1.29 / 1.31
        # represent typical production cluster versions through 2026.
        # Override via workflow_dispatch.inputs.kubernetes_version when
        # validating an ad-hoc cluster spec.
        kube_version: ["1.27.0", "1.29.0", "1.31.0"]

    env:
      KUBE_VERSION: ${{ github.event.inputs.kubernetes_version || matrix.kube_version }}
      KUBECONFORM_OUTPUT: json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm v3.14.4 (matches ci.yml/helm-lint)
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install kubeconform v0.6.7 (pinned, never :latest)
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION="v0.6.7"
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Skip notice (no chart in tree)
        if: ${{ hashFiles('infra/helm/argus/Chart.yaml') == '' }}
        run: |
          echo "::notice::infra/helm/argus/Chart.yaml not found — nothing to validate." >&2
          exit 0

      - name: Run helm_kubeconform.sh (overlay × kubernetes-version)
        if: ${{ hashFiles('infra/helm/argus/Chart.yaml') != '' }}
        id: kubeconform
        run: |
          set -euo pipefail
          chmod +x infra/scripts/helm_kubeconform.sh
          # Tee both stdout and stderr to a per-leg log so the summary step
          # can attach a tail without re-running the validator.
          mkdir -p kubeconform-logs
          bash infra/scripts/helm_kubeconform.sh --kube-version "${KUBE_VERSION}" \
            2>&1 | tee "kubeconform-logs/k8s-${KUBE_VERSION}.log"

      - name: Append job summary (always)
        if: always() && hashFiles('infra/helm/argus/Chart.yaml') != ''
        run: |
          set +e
          log="kubeconform-logs/k8s-${KUBE_VERSION}.log"
          {
            if [[ "${{ job.status }}" == "success" ]]; then
              echo "## Helm kubeconform — k8s ${KUBE_VERSION} — PASSED"
            else
              echo "## Helm kubeconform — k8s ${KUBE_VERSION} — FAILED"
            fi
            echo
            echo "Validated overlays: dev, staging, prod"
            echo "Chart kubeVersion floor: \`>=1.27.0-0\` (Chart.yaml)"
            echo
            if [[ -f "${log}" ]]; then
              echo "<details><summary>kubeconform tail (last 200 lines)</summary>"
              echo
              echo '```'
              tail -n 200 "${log}"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload per-leg log artefact
        if: always() && hashFiles('infra/helm/argus/Chart.yaml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: helm-kubeconform-k8s-${{ env.KUBE_VERSION }}
          path: kubeconform-logs/
          if-no-files-found: ignore
          retention-days: 14

  # T44 (Cycle 6 Batch 5, ARG-054) — Helm `policy.enabled` toggle gate.
  # Renders the chart with both `policy.enabled=false` (default) and
  # `policy.enabled=true` to assert that:
  #   * the disabled render emits ZERO ClusterPolicy documents (no accidental
  #     leak of the supply-chain admission gate into existing overlays);
  #   * the enabled render emits EXACTLY ONE ClusterPolicy document AND that
  #     document validates against the Kyverno CRD schema (Kyverno's CRD
  #     isn't in kubeconform's defaults, so the schema URL is added explicitly);
  #   * the inline template (templates/kyverno-cluster-policy.yaml) is
  #     byte-equal to the standalone source-of-truth YAML (T42), enforced
  #     by infra/scripts/check_policy_drift.sh.
  #
  # This job is independent of the `kubeconform` matrix to keep failure modes
  # isolated — a Kyverno CRD outage on datreeio's catalogue should NOT block
  # the dev/staging/prod overlay validation matrix.
  policy-render-validation:
    name: Helm policy.enabled toggle + Kyverno CRD validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('infra/helm/argus/Chart.yaml') != ''
    permissions:
      contents: read

    env:
      KUBECONFORM_VERSION: v0.6.7
      # Kyverno's ClusterPolicy schema lives in the datreeio CRDs catalogue;
      # adding it as an extra `--schema-location` lets kubeconform validate
      # the rendered ClusterPolicy without needing a live cluster.
      KYVERNO_CRD_SCHEMA: https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
      CRDS_CATALOGUE: https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm v3.14.4
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install kubeconform ${{ env.KUBECONFORM_VERSION }} (pinned, never :latest)
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: helm dependency build (offline-friendly, respects Chart.lock)
        run: |
          set -euo pipefail
          helm dependency build infra/helm/argus

      - name: Render with policy.enabled=false (must emit 0 ClusterPolicy docs)
        run: |
          set -euo pipefail
          count="$(helm template argus infra/helm/argus --set policy.enabled=false \
            | grep -c '^kind: ClusterPolicy$' || echo 0)"
          if [[ "${count}" -ne 0 ]]; then
            echo "::error::policy.enabled=false rendered ${count} ClusterPolicy docs (expected 0)"
            exit 1
          fi
          echo "policy.enabled=false: OK (0 ClusterPolicy documents)"

      - name: Render with policy.enabled=true and validate Kyverno CRD schema
        run: |
          set -euo pipefail
          count="$(helm template argus infra/helm/argus --set policy.enabled=true \
            | grep -c '^kind: ClusterPolicy$' || echo 0)"
          if [[ "${count}" -ne 1 ]]; then
            echo "::error::policy.enabled=true rendered ${count} ClusterPolicy docs (expected 1)"
            exit 1
          fi

          # Validate the rendered policy against the Kyverno CRD schema. The
          # `--skip CustomResourceDefinition` mirrors helm_kubeconform.sh — the
          # chart references CRDs via the catalogue but does not author them.
          helm template argus infra/helm/argus --set policy.enabled=true \
            | kubeconform \
                --strict \
                --summary \
                --output json \
                --kubernetes-version 1.31.0 \
                --skip CustomResourceDefinition \
                --schema-location default \
                --schema-location "${CRDS_CATALOGUE}" \
                --schema-location "${KYVERNO_CRD_SCHEMA}" \
                -
          echo "policy.enabled=true: OK (1 ClusterPolicy document, schema-valid)"

      - name: Drift check (inline template vs standalone YAML)
        run: |
          set -euo pipefail
          bash infra/scripts/check_policy_drift.sh

      - name: Append job summary (always)
        if: always()
        run: |
          set +e
          {
            if [[ "${{ job.status }}" == "success" ]]; then
              echo "## Helm policy toggle + Kyverno CRD validation — PASSED"
            else
              echo "## Helm policy toggle + Kyverno CRD validation — FAILED"
            fi
            echo
            echo "Renders validated:"
            echo "  - policy.enabled=false (expect 0 ClusterPolicy)"
            echo "  - policy.enabled=true  (expect 1 ClusterPolicy, Kyverno CRD schema-valid)"
            echo
            echo "Drift check (inline template ↔ standalone YAML): see step output"
          } >> "${GITHUB_STEP_SUMMARY}"

  # B6-T03 (Cycle 6 Batch 6, T49 / D-5) — prometheusAdapter toggle gate.
  # Renders the chart with both `prometheusAdapter.enabled=false` (default)
  # and `prometheusAdapter.enabled=true` to assert that:
  #   * the disabled render emits ZERO ConfigMap documents matching the
  #     adapter rules name (no accidental leak into existing overlays);
  #   * the enabled render emits EXACTLY ONE ConfigMap, that ConfigMap is
  #     valid YAML, contains `data.config.yaml`, and embeds both the
  #     `argus_celery_queue_depth` and `argus_kev_findings_emit_rate_5m`
  #     externalRules entries the prod celery + KEV-aware HPAs depend on;
  #   * the rendered manifest stream still passes kubeconform schema
  #     validation (catches accidental schema drift on the ConfigMap).
  prometheus-adapter-render-validation:
    name: Helm prometheusAdapter toggle + ConfigMap shape
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('infra/helm/argus/Chart.yaml') != ''
    permissions:
      contents: read

    env:
      KUBECONFORM_VERSION: v0.6.7
      CRDS_CATALOGUE: https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm v3.14.4
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install kubeconform ${{ env.KUBECONFORM_VERSION }} (pinned, never :latest)
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Install yq v4 (mikefarah) for ConfigMap shape assertions
        run: |
          set -euo pipefail
          YQ_VERSION="v4.44.3"
          curl -sSL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: helm dependency build (offline-friendly, respects Chart.lock)
        run: |
          set -euo pipefail
          helm dependency build infra/helm/argus

      - name: Render with prometheusAdapter.enabled=false (must emit 0 adapter ConfigMaps)
        run: |
          set -euo pipefail
          # The adapter ConfigMap is named `<release>-prometheus-adapter-rules`
          # by default; check by the well-known suffix to stay robust against
          # `fullnameOverride` shenanigans in dev overlays.
          count="$(helm template argus infra/helm/argus --set prometheusAdapter.enabled=false \
            | yq eval-all 'select(.kind == "ConfigMap" and (.metadata.name | test("prometheus-adapter-rules$")))' - \
            | grep -c '^kind: ConfigMap$' || echo 0)"
          if [[ "${count}" -ne 0 ]]; then
            echo "::error::prometheusAdapter.enabled=false rendered ${count} adapter ConfigMaps (expected 0)"
            exit 1
          fi
          echo "prometheusAdapter.enabled=false: OK (0 adapter ConfigMaps)"

      - name: Render with prometheusAdapter.enabled=true and assert ConfigMap shape
        run: |
          set -euo pipefail
          rendered="$(mktemp)"
          helm template argus infra/helm/argus --set prometheusAdapter.enabled=true \
            > "${rendered}"

          count="$(yq eval-all 'select(.kind == "ConfigMap" and (.metadata.name | test("prometheus-adapter-rules$")))' "${rendered}" \
            | grep -c '^kind: ConfigMap$' || echo 0)"
          if [[ "${count}" -ne 1 ]]; then
            echo "::error::prometheusAdapter.enabled=true rendered ${count} adapter ConfigMaps (expected 1)"
            exit 1
          fi

          adapter_cm="$(yq eval-all 'select(.kind == "ConfigMap" and (.metadata.name | test("prometheus-adapter-rules$")))' "${rendered}")"

          # Embedded config.yaml must be parseable AND carry both rules.
          inner="$(echo "${adapter_cm}" | yq eval '.data["config.yaml"]' -)"
          if [[ -z "${inner}" || "${inner}" == "null" ]]; then
            echo "::error::adapter ConfigMap missing data.config.yaml"
            exit 1
          fi

          # Each rule's externalMetricName must surface — those names are the
          # contract the HPAs scale on. A typo here silently degrades the
          # cluster to CPU-only scaling.
          if ! echo "${inner}" | yq eval '.externalRules[].name.as' - | grep -qx 'argus_celery_queue_depth'; then
            echo "::error::adapter ConfigMap missing externalRules entry for argus_celery_queue_depth"
            exit 1
          fi
          if ! echo "${inner}" | yq eval '.externalRules[].name.as' - | grep -qx 'argus_kev_findings_emit_rate_5m'; then
            echo "::error::adapter ConfigMap missing externalRules entry for argus_kev_findings_emit_rate_5m"
            exit 1
          fi

          echo "prometheusAdapter.enabled=true: OK (1 ConfigMap, both rules present)"

          # Validate the entire rendered manifest stream against kubeconform
          # so a future regression on the ConfigMap shape (or any sibling
          # resource) fails the gate before it lands in dev/staging/prod.
          kubeconform \
            --strict \
            --summary \
            --output json \
            --kubernetes-version 1.31.0 \
            --skip CustomResourceDefinition \
            --schema-location default \
            --schema-location "${CRDS_CATALOGUE}" \
            "${rendered}"

      - name: Append job summary (always)
        if: always()
        run: |
          set +e
          {
            if [[ "${{ job.status }}" == "success" ]]; then
              echo "## Helm prometheusAdapter toggle + ConfigMap shape — PASSED"
            else
              echo "## Helm prometheusAdapter toggle + ConfigMap shape — FAILED"
            fi
            echo
            echo "Renders validated:"
            echo "  - prometheusAdapter.enabled=false (expect 0 adapter ConfigMaps)"
            echo "  - prometheusAdapter.enabled=true  (expect 1 ConfigMap, both rules: argus_celery_queue_depth + argus_kev_findings_emit_rate_5m)"
          } >> "${GITHUB_STEP_SUMMARY}"

  # B6-T04 (Cycle 6 Batch 6, T50 + T51 / D-3, D-7) — KEV-aware HPA toggle gate.
  # Renders the chart across the cartesian product of the two boolean toggles
  # `prometheusAdapter.enabled` × `autoscaling.kevAware.enabled` and asserts:
  #   * Disabled (default OFF/OFF) emits 0 KEV-aware HPA documents.
  #   * Adapter-only (ON/OFF)       emits 0 KEV-aware HPA documents — the
  #     adapter rules ConfigMap landing alone must NEVER bring the HPA along.
  #   * Aware-only (OFF/ON)         emits 0 KEV-aware HPA documents — the
  #     guard MUST refuse to render when the external metrics ConfigMap is
  #     absent (otherwise the HPA would loop on FailedGetExternalMetric in
  #     production).
  #   * Both enabled (ON/ON)        emits EXACTLY 1 KEV-aware HPA document
  #     AND the document validates against autoscaling/v2 schema with the
  #     two External metric tracks (`argus_kev_findings_emit_rate_5m` and
  #     `argus_celery_queue_depth`) and the R3 anti-thrash policy
  #     (scaleDown.stabilizationWindowSeconds=300, scaleUp +100%/30s,
  #     scaleDown -50%/60s).
  #
  # This is the render-only counterpart to `.github/workflows/kev-hpa-kind.yml`
  # — together they cover schema correctness (this gate, fast) and runtime
  # behavior (kind gate, slower).
  kev-aware-hpa-render-validation:
    name: Helm autoscaling.kevAware toggle + HPA shape
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('infra/helm/argus/Chart.yaml') != ''
    permissions:
      contents: read

    env:
      KUBECONFORM_VERSION: v0.6.7
      CRDS_CATALOGUE: https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
      HPA_NAME_SUFFIX: celery-kev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm v3.14.4
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install kubeconform ${{ env.KUBECONFORM_VERSION }} (pinned, never :latest)
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Install yq v4 (mikefarah) for HPA shape assertions
        run: |
          set -euo pipefail
          YQ_VERSION="v4.44.3"
          curl -sSL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: helm dependency build (offline-friendly, respects Chart.lock)
        run: |
          set -euo pipefail
          helm dependency build infra/helm/argus

      - name: Cartesian toggle gate (4 renders × kev-aware HPA count)
        run: |
          set -euo pipefail
          # Helper: renders the chart with the given toggles and prints the
          # number of HPA documents whose name ends in `-celery-kev`.
          render_count() {
            local prom_adapter="$1"
            local kev_aware="$2"
            helm template argus infra/helm/argus \
              --set "prometheusAdapter.enabled=${prom_adapter}" \
              --set "autoscaling.kevAware.enabled=${kev_aware}" \
              | yq eval-all 'select(.kind == "HorizontalPodAutoscaler" and (.metadata.name | test("'"${HPA_NAME_SUFFIX}"'$")))' - \
              | grep -c '^kind: HorizontalPodAutoscaler$' || echo 0
          }

          declare -A expected
          expected["false:false"]=0
          expected["true:false"]=0
          expected["false:true"]=0
          expected["true:true"]=1

          fail=0
          for combo in "false:false" "true:false" "false:true" "true:true"; do
            adapter="${combo%%:*}"
            aware="${combo##*:}"
            actual="$(render_count "${adapter}" "${aware}")"
            want="${expected[${combo}]}"
            if [[ "${actual}" -ne "${want}" ]]; then
              echo "::error::prometheusAdapter.enabled=${adapter} autoscaling.kevAware.enabled=${aware} rendered ${actual} kev-aware HPAs (expected ${want})"
              fail=1
            else
              echo "OK: prometheusAdapter=${adapter} kevAware=${aware} → ${actual} kev-aware HPA(s)"
            fi
          done

          if [[ "${fail}" -ne 0 ]]; then
            exit 1
          fi

      - name: Render with both toggles ON and assert HPA shape (R3 anti-thrash policy)
        run: |
          set -euo pipefail
          rendered="$(mktemp)"
          helm template argus infra/helm/argus \
            --set prometheusAdapter.enabled=true \
            --set autoscaling.kevAware.enabled=true \
            > "${rendered}"

          hpa="$(yq eval-all 'select(.kind == "HorizontalPodAutoscaler" and (.metadata.name | test("'"${HPA_NAME_SUFFIX}"'$")))' "${rendered}")"
          if [[ -z "${hpa}" ]]; then
            echo "::error::No KEV-aware HPA document found in fully-enabled render"
            exit 1
          fi

          # R3 invariant — scale-down stabilization window MUST be 300s.
          stab="$(echo "${hpa}" | yq eval '.spec.behavior.scaleDown.stabilizationWindowSeconds' -)"
          if [[ "${stab}" != "300" ]]; then
            echo "::error::scaleDown.stabilizationWindowSeconds=${stab}, expected 300 (R3 anti-thrash invariant)"
            exit 1
          fi

          # External metric tracks MUST include both KEV emit rate and queue depth.
          metrics="$(echo "${hpa}" | yq eval '.spec.metrics[] | select(.type == "External") | .external.metric.name' -)"
          if ! echo "${metrics}" | grep -qx 'argus_kev_findings_emit_rate_5m'; then
            echo "::error::HPA missing External metric track 'argus_kev_findings_emit_rate_5m'"
            exit 1
          fi
          if ! echo "${metrics}" | grep -qx 'argus_celery_queue_depth'; then
            echo "::error::HPA missing External metric track 'argus_celery_queue_depth'"
            exit 1
          fi

          # Scale-up policy MUST be +100% per 30s (acceptance criterion R3).
          su_value="$(echo "${hpa}" | yq eval '.spec.behavior.scaleUp.policies[] | select(.type == "Percent") | .value' -)"
          su_period="$(echo "${hpa}" | yq eval '.spec.behavior.scaleUp.policies[] | select(.type == "Percent") | .periodSeconds' -)"
          if [[ "${su_value}" != "100" || "${su_period}" != "30" ]]; then
            echo "::error::scaleUp policy expected +100%/30s, got +${su_value}%/${su_period}s"
            exit 1
          fi

          # Scale-down policy MUST be -50% per 60s (acceptance criterion R3).
          sd_value="$(echo "${hpa}" | yq eval '.spec.behavior.scaleDown.policies[] | select(.type == "Percent") | .value' -)"
          sd_period="$(echo "${hpa}" | yq eval '.spec.behavior.scaleDown.policies[] | select(.type == "Percent") | .periodSeconds' -)"
          if [[ "${sd_value}" != "50" || "${sd_period}" != "60" ]]; then
            echo "::error::scaleDown policy expected -50%/60s, got -${sd_value}%/${sd_period}s"
            exit 1
          fi

          echo "HPA shape: OK (stabilizationWindow=300s, +100%/30s up, -50%/60s down, both External metric tracks present)"

          # Validate the rendered manifest stream against kubeconform so a
          # future regression on the autoscaling/v2 schema fails the gate
          # before it lands in dev/staging/prod.
          kubeconform \
            --strict \
            --summary \
            --output json \
            --kubernetes-version 1.31.0 \
            --skip CustomResourceDefinition \
            --schema-location default \
            --schema-location "${CRDS_CATALOGUE}" \
            "${rendered}"

      - name: Append job summary (always)
        if: always()
        run: |
          set +e
          {
            if [[ "${{ job.status }}" == "success" ]]; then
              echo "## Helm autoscaling.kevAware toggle + HPA shape — PASSED"
            else
              echo "## Helm autoscaling.kevAware toggle + HPA shape — FAILED"
            fi
            echo
            echo "Cartesian toggle matrix validated:"
            echo "  - prometheusAdapter=false × kevAware=false → 0 HPA"
            echo "  - prometheusAdapter=true  × kevAware=false → 0 HPA"
            echo "  - prometheusAdapter=false × kevAware=true  → 0 HPA (guard against orphaned HPA)"
            echo "  - prometheusAdapter=true  × kevAware=true  → 1 HPA"
            echo
            echo "R3 anti-thrash invariants asserted on the fully-enabled render:"
            echo "  - scaleDown.stabilizationWindowSeconds = 300"
            echo "  - scaleUp policy = +100% per 30s"
            echo "  - scaleDown policy = -50% per 60s"
            echo "  - External metric tracks: argus_kev_findings_emit_rate_5m + argus_celery_queue_depth"
          } >> "${GITHUB_STEP_SUMMARY}"

  # C7-T06 (Cycle 7) — KEV-HPA alerts unittest gate.
  # Runs the helm-unittest plugin against `infra/helm/argus/tests/` to assert
  # the PrometheusRule template's behavioural contract:
  #   * default render emits 1 PrometheusRule with 5 alerts;
  #   * `kevHpa.alerts.enabled=false` emits 0 documents;
  #   * each alert carries severity ∈ {critical, warning}, runbook_url,
  #     team=sre, service=argus-scan-worker, environment=<config.environment>;
  #   * production overlay propagates `environment="production"` (Alertmanager
  #     routing key — keeps the rules off the staging pager);
  #   * value-surface overrides (flapThreshold, latencyThresholdSeconds,
  #     additionalLabels) actually propagate into the rendered expressions /
  #     labels (regression guard against silent template drift).
  #
  # Why a separate job instead of folding into kev-aware-hpa-render-validation:
  #   * helm-unittest's failure semantics (per-`it` granularity) deserve their
  #     own status check so reviewers can pinpoint which assertion regressed.
  #   * The plugin install adds ~3-5s; isolating keeps the kubeconform jobs
  #     fast and skipping when only docs/test files change.
  kev-hpa-alerts-unittest:
    name: Helm unittest (KEV-HPA alerts contract)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('infra/helm/argus/Chart.yaml') != ''
    permissions:
      contents: read

    env:
      # Pin to a known-good helm-unittest release. Bump in lock-step with the
      # plugin's compatibility matrix against helm v3.14.x.
      HELM_UNITTEST_VERSION: v0.7.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm v3.14.4 (matches sibling jobs)
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install helm-unittest plugin ${{ env.HELM_UNITTEST_VERSION }} (pinned)
        run: |
          set -euo pipefail
          # `--version` pin avoids surprise plugin upgrades. The plugin source
          # does not ship Sigstore signatures, so `--verify=false` is required
          # — the integrity gate is the helm-unittest source pin itself.
          helm plugin install https://github.com/helm-unittest/helm-unittest \
            --version "${HELM_UNITTEST_VERSION}" \
            --verify=false
          helm unittest --help >/dev/null

      - name: helm dependency build (resolves Bitnami subcharts)
        run: |
          set -euo pipefail
          helm dependency build infra/helm/argus

      - name: Run helm-unittest suites
        run: |
          set -euo pipefail
          # `--color` keeps the per-`it` PASS/FAIL legible in the GHA log.
          # `--strict` makes unset-value assertions fail loud instead of
          # silently passing (helm-unittest 0.5+ default is non-strict).
          # `-f 'tests/test_*.yaml'` matches the C7-T06 plan filename
          # convention (`test_<thing>.yaml`); helm-unittest's default glob
          # is `tests/*_test.yaml` — explicit `-f` keeps both conventions
          # discoverable as the suite grows.
          helm unittest --color --strict -f 'tests/test_*.yaml' infra/helm/argus

      - name: Append job summary (always)
        if: always()
        run: |
          set +e
          {
            if [[ "${{ job.status }}" == "success" ]]; then
              echo "## Helm unittest (KEV-HPA alerts contract) — PASSED"
            else
              echo "## Helm unittest (KEV-HPA alerts contract) — FAILED"
            fi
            echo
            echo "Plugin: helm-unittest \`${HELM_UNITTEST_VERSION}\`"
            echo "Suite:  \`infra/helm/argus/tests/test_kev_hpa_alerts.yaml\`"
            echo
            echo "Coverage:"
            echo "  - default render → 1 PrometheusRule, 5 alerts"
            echo "  - kevHpa.alerts.enabled=false → 0 documents"
            echo "  - each alert: severity ∈ {critical, warning}, runbook_url, team=sre, service=argus-scan-worker, environment=<env>"
            echo "  - production overlay propagates environment=production label"
            echo "  - value-surface overrides (flap/latency thresholds, additionalLabels) propagate to rendered expressions"
          } >> "${GITHUB_STEP_SUMMARY}"
