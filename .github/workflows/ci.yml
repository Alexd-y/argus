name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  JWT_SECRET: test-secret-for-ci-only
  DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src tests main.py

      - name: Ruff format
        run: ruff format --check src tests main.py

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U argus -d argus
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus

      - name: Run tests
        run: pytest tests -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-only
          DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Bandit
        run: bandit -r src -ll

      - name: Safety
        run: safety check --ignore 51457

  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [Frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and audit ${{ matrix.project }}
        run: |
          cd ${{ matrix.project }}
          npm ci 2>/dev/null || npm install
          npm audit --audit-level=high

  helm-lint:
    runs-on: ubuntu-latest
    if: hashFiles('**/Chart.yaml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: |
          for chart in $(find . -name Chart.yaml -exec dirname {} \;); do
            helm lint "$chart"
          done

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security, npm-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend and worker images
        run: docker compose -f infra/docker-compose.yml build backend worker
