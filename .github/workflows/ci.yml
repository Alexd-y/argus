name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  JWT_SECRET: test-secret-for-ci-only
  DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src tests main.py

      - name: Ruff format
        run: ruff format --check src tests main.py

  # ARG-028: pure-Python suite — no Postgres/Redis services required.
  # Mirrors the developer's default ``pytest -q`` and excludes the docker-stack
  # tests via the ``-m "not requires_docker"`` filter declared in pytest.ini /
  # pyproject.toml.
  test-no-docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest (default — no Docker services)
        run: pytest tests --tb=short
        env:
          # SQLite in-memory DSN keeps src.db.session importable without a
          # real PG host — the engine constructor uses StaticPool here.
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: test-secret-for-ci-only
          DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
          ARGUS_TEST_MODE: "1"

  # ARG-028: full-stack suite — runs every test marked ``requires_docker``
  # against live Postgres + Redis service containers.
  test-docker-required:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U argus -d argus
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus

      - name: Run pytest -m requires_docker
        run: pytest tests -m "requires_docker" --tb=short -o "addopts="
        env:
          DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-only
          DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Bandit
        run: bandit -r src -ll

      - name: Safety
        run: safety check --ignore 51457

  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [Frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and audit ${{ matrix.project }}
        run: |
          cd ${{ matrix.project }}
          npm ci 2>/dev/null || npm install
          npm audit --audit-level=high

  # ARG-045: Helm chart lint + render gate.
  # Lints all three environment overlays of `infra/helm/argus/`, renders the
  # production overlay (with fake digests for lint mode), and validates the
  # rendered manifests against Kubernetes schemas via kubeconform.
  helm-lint:
    runs-on: ubuntu-latest
    if: hashFiles('infra/helm/argus/Chart.yaml') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Run helm-lint script
        run: bash infra/scripts/helm_lint.sh

  # ARG-045: Alembic round-trip schema smoke test.
  # Runs the full chain (`alembic upgrade head` → `downgrade -5` → `upgrade
  # head`) against a real Postgres service container and asserts the
  # canonicalised schema dump is byte-equal between rounds (round-trip diff = 0).
  migrations-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run round-trip smoke test (Postgres)
        run: pytest tests/integration/migrations/test_alembic_smoke.py -v --tb=short -o "addopts="
        env:
          DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus_test
          JWT_SECRET: test-secret-for-ci-only
          DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
          ARGUS_TEST_MODE: "1"

      - name: Run shell smoke script (round-trip diff = 0)
        run: bash infra/scripts/migrate_smoke.sh
        working-directory: ${{ github.workspace }}
        env:
          # env.py uses async_engine_from_config → asyncpg URL is required.
          # The schema dumper transparently converts async URLs to sync via
          # _to_sync_url() in scripts/dump_alembic_schema.py.
          DATABASE_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus_test
          PYTHON_BIN: python

  # ARG-039: keep `docs/mcp-server-openapi.yaml` and the auto-generated
  # TypeScript SDK in lock-step with the live FastMCP registry. Two
  # exit-1 gates protect against silent drift:
  #   1. `python -m scripts.export_mcp_openapi --check` → backend ↔ spec
  #   2. `npm run sdk:check` → spec ↔ Frontend SDK
  # Plus a docstring gate ensures every public MCP tool/resource/prompt
  # carries a meaningful description (≥30 chars).
  mcp-openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify MCP OpenAPI spec is in sync with src/mcp
        working-directory: backend
        run: python -m scripts.export_mcp_openapi --check
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: test-secret-for-ci-only
          DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
          ARGUS_TEST_MODE: "1"

      - name: Verify MCP tool/resource/prompt docstrings (>=30 chars)
        working-directory: backend
        run: pytest tests/test_mcp_tools_have_docstrings.py -q --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: test-secret-for-ci-only
          DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
          ARGUS_TEST_MODE: "1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend deps
        working-directory: Frontend
        run: npm ci

      - name: Verify TypeScript SDK is in sync with spec
        working-directory: Frontend
        run: npm run sdk:check

  # T26 (Cycle 6 Batch 6): axe-core accessibility gate for the admin
  # console. Spins the Next.js dev server against a synthetic admin
  # backend mock (no real secrets, no PII), then runs Playwright
  # `admin-axe.spec.ts` which asserts zero `axe-core` violations on:
  #   * /admin/findings (super-admin + admin/no-tenant-binding)
  #   * /admin/audit-logs
  #   * /admin/scans (with export toggle)
  # plus three interactive states (bulk dialog, chain-verify banner,
  # scan-detail drawer). One scenario is currently quarantined via
  # `test.fail` linking ISS-T26-001 — the rest must stay green.
  frontend-a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend deps
        run: npm ci

      - name: Install Playwright Chromium with OS deps
        run: npx playwright install --with-deps chromium

      - name: Run axe-core a11y gate
        run: npm run test:e2e:a11y
        env:
          # Force-disable telemetry / colored output so CI logs stay
          # parseable; the dev server inherits these via the
          # webServer.env block in playwright.a11y.config.ts.
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "true"

      - name: Upload Playwright a11y report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: |
            Frontend/playwright-report/
            Frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-no-docker
      - test-docker-required
      - security
      - npm-audit
      - mcp-openapi-drift
      - helm-lint
      - migrations-smoke
      - frontend-a11y
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend and worker images
        run: docker compose -f infra/docker-compose.yml build backend worker
