        tool_id:
          maxLength: 64
          minLength: 2
          title: Tool Id
          type: string
        tool_run_id:
          anyOf:
          - maxLength: 64
            minLength: 8
            type: string
          - type: 'null'
          default: null
          title: Tool Run Id
      required:
      - tool_id
      - status
      - risk_level
      title: ToolRunTriggerResult
      type: object
    VulnerabilityExplainerPromptArguments:
      additionalProperties: false
      description: Arguments for the `vulnerability.explainer` MCP prompt.
      properties:
        cwe:
          type: string
