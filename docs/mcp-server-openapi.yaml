      bearerFormat: JWT
      description: Static token, JWT access token, or HMAC-issued bearer (see backend/src/mcp/auth.py).
      scheme: bearer
      type: http
info:
  contact:
    name: ARGUS Engineering
    url: https://github.com/argus/argus
  description: "Model Context Protocol surface for ARGUS \u2014 generated from FastMCP Pydantic schemas; do not edit by hand.\
    \ Regenerate via `python -m scripts.export_mcp_openapi --out ../docs/mcp-server-openapi.yaml`."
  license:
    name: Proprietary
  title: ARGUS MCP Server
  version: 0.4.0
openapi: 3.1.0
paths:
  /prompts/remediation.advisor:
    post:
      description: 'Generates step-by-step remediation guidance for a finding. Inputs: title, severity, stack hint (optional),
        evidence summary.'
      operationId: render_remediation_advisor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediationAdvisorPromptArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Rendered prompt as a list of MCP messages.
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
      summary: Propose safe-by-default remediation steps for a finding
      tags:
      - mcp-prompt
  /prompts/severity.normalizer:
    post:
      description: Maps an unstructured advisory to ARGUS-canonical severity, CVSS-3.1 vector, and OWASP 2025 Top-10 category.
      operationId: render_severity_normalizer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeverityNormalizerPromptArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Rendered prompt as a list of MCP messages.
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
      summary: Normalize advisory severity to CVSS-3.1 + OWASP Top-10
      tags:
      - mcp-prompt
  /prompts/vulnerability.explainer:
    post:
      description: 'Produce a stakeholder-friendly explanation of a single finding. Inputs: title, severity, optional CWE
        / OWASP / description.'
      operationId: render_vulnerability_explainer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnerabilityExplainerPromptArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Rendered prompt as a list of MCP messages.
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
      summary: Explain a finding to a non-security audience
      tags:
      - mcp-prompt
  /resources/approvals/pending:
    get:
      description: Tenant-scoped pending approval requests (capped at 100). Operators should poll this resource and submit
        decisions via approvals.decide.
      operationId: read_argus_approvals_pending
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: OK
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
      summary: Pending approval queue
      tags:
      - mcp-resource
  /resources/catalog/tools:
    get:
      description: Snapshot of the signed tool catalog (capped at 200 entries). Sandbox-internal fields (image, command_template,
        etc.) are stripped.
      operationId: read_argus_catalog_tools
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: OK
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
      summary: ARGUS signed tool catalog
      tags:
      - mcp-resource
  /resources/findings/{scan_id}:
    get:
      description: Paginated findings for the given scan (tenant-scoped; capped at 200 entries).
      operationId: read_argus_findings_scan
      parameters:
      - in: path
        name: scan_id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: OK
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
      summary: ARGUS findings for a scan
      tags:
      - mcp-resource
  /resources/reports/{report_id}:
    get:
      description: Tenant-scoped report metadata and short-lived presigned URL. Defaults to JSON format.
      operationId: read_argus_reports_report
      parameters:
      - in: path
        name: report_id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: OK
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
      summary: ARGUS report metadata + presigned URL
      tags:
      - mcp-resource
  /rpc/approvals.decide:
    post:
      description: 'Record an operator decision (grant / deny / revoke) on an approval request. The MCP server verifies signatures
        but never produces them: GRANT decisions require a pre-computed Ed25519 signature.'
      operationId: call_approvals_decide
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/approvals_decideArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecideResult'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: approvals.decide
      tags:
      - mcp-tool
  /rpc/approvals.list:
    post:
      description: List approval requests visible to the authenticated tenant. Supports filtering by status (pending/granted/denied/revoked/expired)
        and tool_id.
      operationId: call_approvals_list
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/approvals_listArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalListResult'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: approvals.list
      tags:
      - mcp-tool
  /rpc/findings.get:
    post:
      description: Return a single finding (with redacted evidence and proof-of-concept) owned by the authenticated tenant.
      operationId: call_findings_get
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/findings_getArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingDetail'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: findings.get
      tags:
      - mcp-tool
  /rpc/findings.list:
    post:
      description: List findings for a scan owned by the authenticated tenant. Supports filtering by severity, CWE, OWASP
        category, and confidence; returns paginated summaries.
      operationId: call_findings_list
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/findings_listArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingListResult'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: findings.list
      tags:
      - mcp-tool
  /rpc/findings.mark_false_positive:
    post:
      description: "Mark a finding as a false positive (with operator justification). Idempotent \u2014 returning ``unchanged``\
        \ when already flagged."
      operationId: call_findings_mark_false_positive
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/findings_mark_false_positiveArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingMarkResult'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: findings.mark_false_positive
      tags:
      - mcp-tool
  /rpc/policy.evaluate:
    post:
      description: Run the PolicyEngine against a hypothetical action and return one of allowed / requires_approval / denied.
        Used by the LLM to pre-flight a tool call before invoking ``tool.run.trigger``.
      operationId: call_policy_evaluate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/policy_evaluateArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyEvaluateResult'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: policy.evaluate
      tags:
      - mcp-tool
  /rpc/report.download:
    post:
      description: Return a short-lived presigned URL and SHA-256 for a report owned by the authenticated tenant. The MCP
        server NEVER streams artifact bytes in the JSON-RPC response.
      operationId: call_report_download
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/report_downloadArguments'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDownloadResult'
          description: "OK \u2014 tool call accepted and executed."
        '400':
          description: "Invalid arguments \u2014 validation error."
        '401':
          description: Unauthorized (missing or invalid bearer / API key).
        '403':
          description: "Forbidden \u2014 tenant mismatch, scope violation, or policy denial."
        '404':
          description: Resource not found (anti-enumeration response).
        '422':
          description: "Invalid arguments \u2014 validation error."
        '429':
          description: Rate limit exceeded.
        '500':
          description: Internal MCP error (server-side stack trace redacted).
      summary: report.download
      tags:
      - mcp-tool
  /rpc/report.generate:
    post:
      description: "Queue a report (Midgard / Asgard / Valhalla cascade) for a scan owned by the authenticated tenant. The\
        \ MCP server only enqueues the generation job \u2014 poll ``report.download`` for the artifact."
      operationId: call_report_generate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/report_generateArguments'
        required: true
