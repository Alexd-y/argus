            type: string
          - type: 'null'
          default: null
          title: Started At
        status:
          $ref: '#/components/schemas/ToolRunStatus'
        tool_id:
          maxLength: 64
          minLength: 2
          title: Tool Id
          type: string
        tool_run_id:
          maxLength: 64
          minLength: 8
          title: Tool Run Id
          type: string
      required:
      - tool_run_id
      - tool_id
      - status
      title: ToolRunStatusResult
      type: object
    ToolRunTriggerInput:
      additionalProperties: false
      description: '``tool.run.trigger(tool_id, target, params)`` arguments.'
      properties:
        justification:
          anyOf:
          - maxLength: 512
            type: string
          - type: 'null'
          default: null
          description: Required when the resolved tool has ``risk_level >= high``.
          title: Justification
        params:
          additionalProperties:
            type: string
          description: "Whitelisted argv overrides \u2014 keys must match the tool's allowed placeholder set (see src.sandbox.templating.ALLOWED_PLACEHOLDERS)."
          title: Params
          type: object
        scan_id:
          anyOf:
          - maxLength: 64
            minLength: 8
            type: string
          - type: 'null'
          default: null
          title: Scan Id
        target:
          maxLength: 2048
          minLength: 1
          title: Target
          type: string
        tool_id:
          maxLength: 64
          minLength: 2
          title: Tool Id
          type: string
      required:
