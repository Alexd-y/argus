# ARGUS Infrastructure — production-ready stack
# PostgreSQL, Redis, MinIO, Backend, Worker, Nginx
#
# Usage:
#   Production: docker compose -f infra/docker-compose.yml up
#   Dev: docker compose up (from infra/ — docker-compose.override.yml auto-loaded)
#
# Env: copy infra/.env.example to infra/.env (see .env.example for path)
#
# SECURITY — Default secrets (POSTGRES_*, REDIS_*, MINIO_*, JWT_SECRET):
#   Defaults are for dev convenience only. PRODUCTION MUST override via .env:
#   - Use strong unique passwords (openssl rand -hex 32)
#   - Never deploy with default values

name: argus

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: argus-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # Ports: NOT exposed in production. Use docker-compose.dev.yml for dev (local DB access)
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    env_file: .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    volumes:
      - redis_data:/data
    # Ports: NOT exposed in production. Use docker-compose.override.yml for dev
    networks:
      - data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: argus-minio
    env_file: .env
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-argus}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-argussecret}
    volumes:
      - minio_data:/data
    # Ports: NOT exposed in production. Use docker-compose.dev.yml for dev
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: argus-minio-init
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        until mc alias set argus http://minio:9000 $${MINIO_ACCESS_KEY:-argus} $${MINIO_SECRET_KEY:-argussecret} 2>/dev/null; do
          echo 'Waiting for MinIO...' && sleep 2;
        done;
        mc mb --ignore-existing argus/$${MINIO_BUCKET:-argus};
        mc mb --ignore-existing argus/stage1-artifacts;
        mc mb --ignore-existing argus/stage2-artifacts;
        mc mb --ignore-existing argus/stage3-artifacts;
        mc mb --ignore-existing argus/stage4-artifacts;
        mc mb --ignore-existing argus/argus-recon;
        echo 'MinIO buckets ready';
      "
    networks:
      - data
    depends_on:
      minio:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/backend/Dockerfile
    image: argus-backend
    container_name: argus-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus}@postgres:5432/${POSTGRES_DB:-argus}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-argus}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-argussecret}
      MINIO_BUCKET: ${MINIO_BUCKET:-argus}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod-32chars}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      SANDBOX_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      VERCEL_FRONTEND_URL: ${VERCEL_FRONTEND_URL:-}
    networks:
      - backend
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: argus-worker
    container_name: argus-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus}@postgres:5432/${POSTGRES_DB:-argus}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-argus}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-argussecret}
      MINIO_BUCKET: ${MINIO_BUCKET:-argus}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      SANDBOX_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
    networks:
      - backend
      - data
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app inspect ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  sandbox:
    build:
      context: ../sandbox
      dockerfile: Dockerfile
    image: argus-sandbox
    container_name: argus-sandbox
    volumes:
      - ../plugins/exploit_scripts:/opt/exploit_scripts:ro
      - sandbox_tmp:/tmp/argus-sandbox
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "id argus || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: argus-nginx
    env_file: .env
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - frontend
      - backend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: argus-cloudflared
    env_file: .env
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      # cloudflared reads token from TUNNEL_TOKEN (not argv); .env may use CLOUDFLARE_TUNNEL_TOKEN
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - frontend
    depends_on:
      nginx:
        condition: service_healthy
    profiles:
      - tunnel

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sandbox_tmp:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
