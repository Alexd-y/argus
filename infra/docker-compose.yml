# ARGUS Infrastructure — production-ready stack
# PostgreSQL, Redis, MinIO, Backend, Worker, Nginx
#
# Usage:
#   Production: docker compose -f infra/docker-compose.yml up
#   Dev: docker compose up (from infra/ — docker-compose.override.yml auto-loaded)
#
# Env: copy infra/.env.example to infra/.env (see .env.example for path)
#
# SECURITY — Default secrets (POSTGRES_*, REDIS_*, MINIO_*, JWT_SECRET):
#   Defaults are for dev convenience only. PRODUCTION MUST override via .env:
#   - Use strong unique passwords (openssl rand -hex 32)
#   - Never deploy with default values

name: argus

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: argus-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # Ports: NOT exposed in production. Use docker-compose.dev.yml for dev (local DB access)
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    env_file: .env
    # WARNING: If REDIS_PASSWORD is empty, Redis runs without authentication.
    # For production, always set REDIS_PASSWORD in .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    volumes:
      - redis_data:/data
    # Ports: NOT exposed in production. Use docker-compose.override.yml for dev
    networks:
      - data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: argus-minio
    env_file: .env
    # Console on fixed port so host mapping 9001:9001 (override/dev) works
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-argus}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    # Ports: NOT exposed in production. Use docker-compose.dev.yml for dev
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot job: mc creates S3 buckets after MinIO is healthy. The container EXITS 0 when done —
  # in Docker Desktop this looks "stopped"; that is expected (not a crash). Re-run if needed:
  #   docker compose -f infra/docker-compose.yml run --rm minio-init
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: argus-minio-init
    env_file: .env
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        until mc alias set argus http://minio:9000 $${MINIO_ACCESS_KEY:-argus} $${MINIO_SECRET_KEY} 2>/dev/null; do
          echo 'Waiting for MinIO...' && sleep 2;
        done;
        mc mb --ignore-existing argus/$${MINIO_BUCKET:-argus};
        mc mb --ignore-existing argus/$${MINIO_REPORTS_BUCKET:-argus-reports};
        mc mb --ignore-existing argus/stage1-artifacts;
        mc mb --ignore-existing argus/stage2-artifacts;
        mc mb --ignore-existing argus/stage3-artifacts;
        mc mb --ignore-existing argus/stage4-artifacts;
        mc mb --ignore-existing argus/argus-recon;
        echo 'MinIO buckets ready';
      "
    networks:
      - data
    depends_on:
      minio:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/backend/Dockerfile
    image: argus-backend
    container_name: argus-backend
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-argus}
      # SECURITY (H-7): When REDIS_PASSWORD is set, REDIS_URL and CELERY_BROKER_URL
      # MUST include the password: redis://:PASSWORD@redis:6379/0
      # Defaults below assume no auth (dev). Override in .env for production.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-argus}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-argus}
      MINIO_REPORTS_BUCKET: ${MINIO_REPORTS_BUCKET:-argus-reports}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      SANDBOX_ENABLED: "${SANDBOX_ENABLED:-true}"
      VA_AI_PLAN_ENABLED: "${VA_AI_PLAN_ENABLED:-false}"
      SQLMAP_VA_ENABLED: "${SQLMAP_VA_ENABLED:-false}"
      VA_EXPLOIT_AGGRESSIVE_ENABLED: "${VA_EXPLOIT_AGGRESSIVE_ENABLED:-false}"
      ACTIVE_SCAN_MAX_CONCURRENT_JOBS: ${ACTIVE_SCAN_MAX_CONCURRENT_JOBS:-3}
      ACTIVE_SCAN_MAX_CAPTURE_BYTES: ${ACTIVE_SCAN_MAX_CAPTURE_BYTES:-4194304}
      VA_ACTIVE_SCAN_TOOL_TIMEOUT_SEC: ${VA_ACTIVE_SCAN_TOOL_TIMEOUT_SEC:-120}
      VA_AGGRESSIVE_SCAN: "${VA_AGGRESSIVE_SCAN:-false}"
      VA_CUSTOM_XSS_POC_ENABLED: "${VA_CUSTOM_XSS_POC_ENABLED:-true}"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      VERCEL_FRONTEND_URL: ${VERCEL_FRONTEND_URL:-}
    volumes:
      # SECURITY: docker.sock is required for VA active-scan sandbox exec.
      # In production, prefer a dedicated sandbox REST API (see docs/security.md).
      # Risk: container compromise → host control. Mitigate with read-only mount + network isolation.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: argus-worker
    container_name: argus-worker
    # Docker socket requires docker group (GID from host). Override GID if needed:
    #   DOCKER_GID=$(stat -c '%g' /var/run/docker.sock) docker compose up
    user: "1000:${DOCKER_GID:-999}"
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-argus}
      # SECURITY (H-7): When REDIS_PASSWORD is set, REDIS_URL and CELERY_BROKER_URL
      # MUST include the password: redis://:PASSWORD@redis:6379/0
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-argus}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-argus}
      MINIO_REPORTS_BUCKET: ${MINIO_REPORTS_BUCKET:-argus-reports}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      SANDBOX_ENABLED: "${SANDBOX_ENABLED:-true}"
      VA_AI_PLAN_ENABLED: "${VA_AI_PLAN_ENABLED:-false}"
      SQLMAP_VA_ENABLED: "${SQLMAP_VA_ENABLED:-false}"
      VA_EXPLOIT_AGGRESSIVE_ENABLED: "${VA_EXPLOIT_AGGRESSIVE_ENABLED:-false}"
      ACTIVE_SCAN_MAX_CONCURRENT_JOBS: ${ACTIVE_SCAN_MAX_CONCURRENT_JOBS:-3}
      ACTIVE_SCAN_MAX_CAPTURE_BYTES: ${ACTIVE_SCAN_MAX_CAPTURE_BYTES:-4194304}
      VA_ACTIVE_SCAN_TOOL_TIMEOUT_SEC: ${VA_ACTIVE_SCAN_TOOL_TIMEOUT_SEC:-120}
      VA_AGGRESSIVE_SCAN: "${VA_AGGRESSIVE_SCAN:-false}"
      VA_CUSTOM_XSS_POC_ENABLED: "${VA_CUSTOM_XSS_POC_ENABLED:-true}"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
    volumes:
      # SECURITY: docker.sock is required for VA active-scan sandbox exec.
      # In production, prefer a dedicated sandbox REST API (see docs/security.md).
      # Risk: container compromise → host control. Mitigate with read-only mount + network isolation.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
      - data
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app inspect ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  sandbox:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
      args:
        SANDBOX_PROFILE: ${SANDBOX_PROFILE:-standard}
        INSTALL_MSF: ${INSTALL_MSF:-false}
    image: argus-sandbox
    container_name: argus-sandbox
    volumes:
      - ../plugins/exploit_scripts:/opt/exploit_scripts:ro
      - sandbox_tmp:/tmp/argus-sandbox
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "id argus || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Gateway: maps host HTTP(S) ports to nginx; `/api/*` → backend:8000 unchanged.
  # Frontend uses base `/api/v1` (NEXT_PUBLIC_API_URL). Reports (RPT-003/004):
  #   /api/v1/reports, /api/v1/reports/{id}/download, POST /api/v1/reports/generate,
  #   /api/v1/scans/{scan_id}/reports/generate(+all). Secrets: ARGUS_GATEWAY_API_KEY / CORS via .env only.
  nginx:
    image: nginx:1.27-alpine
    container_name: argus-nginx
    env_file: .env
    entrypoint: ["/docker-entrypoint.sh"]
    environment:
      # Accept either ARGUS_CORS_ALLOWED_ORIGINS (canonical) or CORS_ORIGINS
      # (used by backend FastAPI app) so the same .env value drives both layers.
      # Without this, the nginx CORS map silently falls back to the example
      # default and Vercel preflights are denied at the gateway.
      ARGUS_CORS_ALLOWED_ORIGINS: ${ARGUS_CORS_ALLOWED_ORIGINS:-${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}}
      # Optional server-side API key injection for proxied /api requests.
      # Keep this key PRIVATE (infra/.env only). Prefer a dedicated key with
      # limited scope/rate-limits; do not expose backend auth keys in frontend JS.
      ARGUS_GATEWAY_API_KEY: ${ARGUS_GATEWAY_API_KEY:-${ARGUS_API_KEYS:-}}
    ports:
      - "${ARGUS_HTTP_PORT:-8080}:80"
      # Default 19443: 8443/8449 often fail on Windows (Hyper-V excluded ranges).
      # TLS termination inside nginx is optional (see nginx/ssl + api-tls); port mapping preserved for HTTPS when enabled.
      - "${ARGUS_HTTPS_PORT:-19443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    networks:
      - frontend
      - backend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use IPv4 explicitly: BusyBox wget on Alpine resolves "localhost" to ::1
      # first and fails with "Connection refused" because nginx only binds
      # 0.0.0.0:80 (no `listen [::]:80` directive in api.conf).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Cloudflare Tunnel (remotely managed). Start only with: docker compose --profile tunnel up
  #
  # If CLOUDFLARE_TUNNEL_TOKEN is empty/unset and you enable this profile, the official cloudflared
  # image would run `tunnel run` without credentials and exit with:
  #   "cloudflared tunnel run" requires the ID or name of the tunnel
  # This service uses a thin Alpine wrapper so we validate the token first and call:
  #   cloudflared tunnel --no-autoupdate run --token <JWT>
  # Compose maps infra/.env CLOUDFLARE_TUNNEL_TOKEN → TUNNEL_TOKEN inside the container (compatible with --token).
  cloudflared:
    build:
      context: ./cloudflared
      dockerfile: Dockerfile
    image: argus-cloudflared:latest
    container_name: argus-cloudflared
    env_file: .env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - frontend
    depends_on:
      nginx:
        condition: service_healthy
    profiles:
      - tunnel

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sandbox_tmp:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
