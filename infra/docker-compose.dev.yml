# ARGUS Development overrides — port exposure for local tools
# Production compose does NOT expose postgres/redis/minio ports.
# Usage: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/backend/Dockerfile
    environment:
      LOG_LEVEL: DEBUG
      SANDBOX_ENABLED: "true"
    volumes:
      - ../backend:/app

  sandbox:
    volumes:
      - ../plugins/exploit_scripts:/opt/exploit_scripts:ro
