# ──────────────────────────────────────────────────────────────────────────────
# ARGUS — PROD overlay
# ──────────────────────────────────────────────────────────────────────────────
# Production-grade settings:
#   * 3+ replicas + autoscaling on backend / celery
#   * Cosign verify-init MANDATORY (chart refuses to render if disabled)
#   * SealedSecrets ON; plain secrets blocked
#   * NetworkPolicies ON with default-deny baseline
#   * OTel + Prometheus + cert-manager ON
#   * PodDisruptionBudgets at minAvailable=2 to survive node drains

global:
  imageRegistry: ghcr.io
  storageClass: gp3

config:
  logLevel: INFO
  environment: production
  scanWorkerConcurrency: 8
  rateLimiter:
    bucketCapacity: 120
    refillRatePerSec: 2.0

replicaCount:
  backend: 3
  celery: 4
  frontend: 3
  mcp: 2

resources:
  backend:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  celery:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  frontend:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  mcp:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Production INVARIANT: cosign.verify.enabled MUST be true. The chart helper
# `argus.cosignAssertProd` (templates/_helpers.tpl) fails the render when this
# flag is set to false in prod context (config.environment == production).
cosign:
  verify:
    enabled: true
    keyless:
      enabled: true
      certificateIdentityRegexp: "^https://github\\.com/your-org/ARGUS/\\.github/workflows/release\\.yml@refs/tags/v.*"
      certificateOidcIssuer: "https://token.actions.githubusercontent.com"
    keyed:
      enabled: false  # Rollback escape hatch — keep disabled in prod.

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "63072000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
  host: argus.example.invalid
  tls:
    enabled: true
    secretName: argus-prod-tls

certManager:
  enabled: true
  clusterIssuer: letsencrypt-prod

prometheus:
  serviceMonitor:
    enabled: true
    interval: 15s
    namespace: monitoring

# B6-T03 (T49 / D-5) — production exposes the queue-depth gauge AND the
# KEV-rate derived metric to the cluster-wide Prometheus Adapter so the
# existing celery HPA (`hpa.celery.customMetrics`) and the KEV-aware
# HPA (B6-T04) both have a real series to scale on. The adapter itself
# is provisioned out-of-band (one per cluster); this overlay only ships
# the rules ConfigMap the adapter consumes via its `--config` flag.
prometheusAdapter:
  enabled: true
  configMap:
    labels:
      # Discovery label the platform's Prometheus Adapter chart uses to
      # find additional rules ConfigMaps cluster-wide. Adjust here if your
      # ops standard differs (e.g. `metrics.adapter/role: rules`).
      app.kubernetes.io/managed-by-rules: prometheus-adapter
  rules:
    queueDepth:
      enabled: true
    kevEmitRate:
      enabled: true

otelInstrumentation:
  enabled: true
  endpoint: http://otel-collector.observability.svc:4317
  sampleRatio: "0.05"

hpa:
  enabled: true
  backend:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  celery:
    minReplicas: 4
    maxReplicas: 40
    targetCPUUtilizationPercentage: 70
    customMetrics:
      enabled: true
      metricName: argus_celery_queue_depth
      averageValue: "50"

# B6-T04 (T50 + T51 / D-3, D-7) — production flips the KEV-aware HPA on so the
# celery worker pool reacts to KEV-listed finding bursts AND scan-queue
# backpressure in addition to the CPU recommendation from the base hpa.celery.
# Two HPAs targeting the same Deployment compose with union-max semantics
# (Kubernetes picks the higher recommended replica count).
#
# Tuned values vs the chart default (which is opt-OFF for safety):
#   * minReplicas raised from 2 → 4 to match hpa.celery.minReplicas — keeps
#     the union floor at 4 so a quiet CPU window cannot pin the pool below
#     the production warm-pool target.
#   * maxReplicas raised from 20 → 40 to match hpa.celery.maxReplicas — gives
#     the KEV burst path the same headroom the CPU path already has.
#   * kevEmitRateTarget kept at 1.0/s — the production KEV ingestion rate
#     during a typical CISA bulletin spike is 0.5–2 findings/s sustained;
#     this target triggers a scale-up at the low end of that band so the
#     pool grows BEFORE the queue starts to back up.
#   * queueDepthTarget kept at 50 — matches hpa.celery.customMetrics so the
#     two queue-driven recommendations agree on the trip point.
autoscaling:
  kevAware:
    enabled: true
    minReplicas: 4
    maxReplicas: 40
    kevEmitRateTarget: 1
    queueDepthTarget: 50
    queueDepthQueueLabel: argus.scans

pdb:
  enabled: true
  minAvailable: 2

networkPolicies:
  enabled: true
  defaultDeny: true
  cloudIam:
    enabled: true
    provider: aws

sealedSecrets:
  enabled: true

postgresql:
  primary:
    persistence:
      size: 200Gi
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  metrics:
    enabled: true

redis:
  architecture: replication
  master:
    persistence:
      size: 16Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  replica:
    replicaCount: 2
    persistence:
      size: 16Gi
  metrics:
    enabled: true

minio:
  mode: distributed
  statefulset:
    replicaCount: 4
  persistence:
    size: 500Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  metrics:
    serviceMonitor:
      enabled: true

# Production overlay flips supply-chain admission gate ON. All production
# images are Cosign-signed via the cycle-4 sign_images.sh pipeline; the
# kind CI gate (T44) keeps regression coverage on every PR.
policy:
  enabled: true
