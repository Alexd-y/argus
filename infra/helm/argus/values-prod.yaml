# ──────────────────────────────────────────────────────────────────────────────
# ARGUS — PROD overlay
# ──────────────────────────────────────────────────────────────────────────────
# Production-grade settings:
#   * 3+ replicas + autoscaling on backend / celery
#   * Cosign verify-init MANDATORY (chart refuses to render if disabled)
#   * SealedSecrets ON; plain secrets blocked
#   * NetworkPolicies ON with default-deny baseline
#   * OTel + Prometheus + cert-manager ON
#   * PodDisruptionBudgets at minAvailable=2 to survive node drains

global:
  imageRegistry: ghcr.io
  storageClass: gp3

config:
  logLevel: INFO
  environment: production
  scanWorkerConcurrency: 8
  rateLimiter:
    bucketCapacity: 120
    refillRatePerSec: 2.0

replicaCount:
  backend: 3
  celery: 4
  frontend: 3
  mcp: 2

resources:
  backend:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  celery:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  frontend:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  mcp:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Production INVARIANT: cosign.verify.enabled MUST be true. The chart helper
# `argus.cosignAssertProd` (templates/_helpers.tpl) fails the render when this
# flag is set to false in prod context (config.environment == production).
cosign:
  verify:
    enabled: true
    keyless:
      enabled: true
      certificateIdentityRegexp: "^https://github\\.com/your-org/ARGUS/\\.github/workflows/release\\.yml@refs/tags/v.*"
      certificateOidcIssuer: "https://token.actions.githubusercontent.com"
    keyed:
      enabled: false  # Rollback escape hatch — keep disabled in prod.

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "63072000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
  host: argus.example.invalid
  tls:
    enabled: true
    secretName: argus-prod-tls

certManager:
  enabled: true
  clusterIssuer: letsencrypt-prod

prometheus:
  serviceMonitor:
    enabled: true
    interval: 15s
    namespace: monitoring

otelInstrumentation:
  enabled: true
  endpoint: http://otel-collector.observability.svc:4317
  sampleRatio: "0.05"

hpa:
  enabled: true
  backend:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  celery:
    minReplicas: 4
    maxReplicas: 40
    targetCPUUtilizationPercentage: 70
    customMetrics:
      enabled: true
      metricName: argus_celery_queue_depth
      averageValue: "50"

pdb:
  enabled: true
  minAvailable: 2

networkPolicies:
  enabled: true
  defaultDeny: true
  cloudIam:
    enabled: true
    provider: aws

sealedSecrets:
  enabled: true

postgresql:
  primary:
    persistence:
      size: 200Gi
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  metrics:
    enabled: true

redis:
  architecture: replication
  master:
    persistence:
      size: 16Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  replica:
    replicaCount: 2
    persistence:
      size: 16Gi
  metrics:
    enabled: true

minio:
  mode: distributed
  statefulset:
    replicaCount: 4
  persistence:
    size: 500Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  metrics:
    serviceMonitor:
      enabled: true

# Production overlay flips supply-chain admission gate ON. All production
# images are Cosign-signed via the cycle-4 sign_images.sh pipeline; the
# kind CI gate (T44) keeps regression coverage on every PR.
policy:
  enabled: true
