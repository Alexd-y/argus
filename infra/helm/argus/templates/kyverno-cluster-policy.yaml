{{- /*
T43 (Cycle 6 Batch 5, ARG-054) — Helm-rendered Kyverno ClusterPolicy.

Identical to infra/kyverno/cluster-policy-require-signed-images.yaml.
Drift between the two is enforced by infra/scripts/check_policy_drift.sh
(runs in helm-validation.yml). Default is gated off via
.Values.policy.enabled = false to keep `helm upgrade` workflows
backward-compatible until all production images are Cosign-signed.
*/ -}}
{{- if .Values.policy.enabled }}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: argus-require-signed-images
  annotations:
    policies.kyverno.io/title: "ARGUS — require Cosign-signed images with digest"
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.16.0
    policies.kyverno.io/description: >-
      Closes ARG-054. Every workload image must (a) be signed by Sigstore
      Cosign keyless attestation issued via GitHub Actions OIDC for the
      ARGUS organisation, and (b) reference a sha256 digest. Tag-only
      references are immutable-vulnerable and are rejected.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: verify-cosign-signed
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      verifyImages:
        - imageReferences:
            - "*"
          required: true
          verifyDigest: true
          mutateDigest: false
          attestors:
            - count: 1
              entries:
                # Replace `ARGUS-org/ARGUS` with the actual GitHub org/repo
                # before enabling in production. The regex matches every
                # workflow path under `.github/workflows/` of that repo.
                - keyless:
                    subject: "https://github.com/ARGUS-org/ARGUS/.github/workflows/.+"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: "https://rekor.sigstore.dev"
{{- end }}
