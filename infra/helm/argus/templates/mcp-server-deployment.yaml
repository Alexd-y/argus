{{- include "argus.cosignAssertProd" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argus.fullname" . }}-mcp
  labels:
    {{- include "argus.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.replicaCount.mcp }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "argus.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        {{- include "argus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.mcp.metricsPort | quote }}
        prometheus.io/path: "/metrics"
        argus.image.digest/mcp: {{ .Values.image.mcp.digest | quote }}
    spec:
      serviceAccountName: {{ include "argus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "argus.imagePullSecrets" . | nindent 6 }}
      initContainers:
        {{- include "argus.cosignVerifyInit" (dict "root" $ "image" .Values.image.mcp "name" "verify-mcp") | nindent 8 }}
      containers:
        - name: mcp-server
          image: {{ include "argus.imageRef" (dict "image" .Values.image.mcp "root" $) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.mcp.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.mcp.metricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "argus.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.existingSecretName }}
                  key: {{ .Values.secrets.database.existingSecretKey }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.existingSecretName }}
                  key: {{ .Values.secrets.redis.existingSecretKey }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.webhooks.slackSecretName }}
                  key: {{ .Values.secrets.webhooks.slackSecretKey }}
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.mcp | nindent 12 }}
          volumeMounts:
            {{- include "argus.standardVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "argus.standardVolumes" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.affinity }}
        {{- toYaml .Values.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "argus.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: mcp-server
                topologyKey: topology.kubernetes.io/zone
        {{- end }}
