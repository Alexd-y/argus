# ARGUS Nginx — shared http-level directives
# Loaded before api.conf (alphabetical order).
# Server blocks and API routing are in api.conf.

# ── Gzip compression ────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    text/xml
    application/xml;

# ── Timeouts (global defaults) ──────────────────────────────────────
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    300s;
send_timeout          60s;

# ── Buffer sizes ────────────────────────────────────────────────────
proxy_buffer_size     16k;
proxy_buffers         4 32k;
proxy_busy_buffers_size 64k;

# ── Hide upstream nginx version ─────────────────────────────────────
server_tokens off;
