# ARGUS API Gateway — nginx reverse proxy
# Generated from api.conf.template by docker-entrypoint.sh at container start.
# Do NOT edit api.conf directly in the container; modify this template instead.
#
# Features:
#   - Reverse proxy to backend (http://backend:8000)
#   - Rate limiting (30 req/s per IP, burst 50)
#   - Security headers (X-Frame-Options, X-Content-Type-Options, HSTS-ready)
#   - CORS whitelist (map-based origin validation, populated from ARGUS_CORS_ALLOWED_ORIGINS)
#   - SSE support for /api/v1/scans/ (long-lived connections)
#   - Health-check endpoint for docker healthcheck
#   - Commented SSL block for production TLS termination with HSTS

upstream argus_backend {
    server backend:8000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# ── Map hash sizing ──────────────────────────────────────────────────
# Default 64-byte bucket overflows on long origins like Vercel preview URLs
# (e.g. `argus-frontend-<hash>-<org>-projects-<id>.vercel.app`). Must be
# declared here (not in default.conf) because conf.d files load in
# alphabetical order, so api.conf is parsed before default.conf.
map_hash_bucket_size 256;
map_hash_max_size    2048;

# ── CORS origin whitelist ─────────────────────────────────────────────
# Built by docker-entrypoint.sh from ARGUS_CORS_ALLOWED_ORIGINS env var.
# Non-matching origins get an empty value, which browsers treat as "denied".
map $http_origin $cors_allow_origin {
    default "";
    "https://argus-frontend.vercel.app" $http_origin;
    ~^https://argus-frontend(-[a-z0-9]+)?-alexds-projects-[a-z0-9]+\.vercel\.app$ $http_origin;
    "http://localhost:3000" $http_origin;
    "http://127.0.0.1:3000" $http_origin;

}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50m;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"      always;
    # X-XSS-Protection: set to "0" — the legacy "1; mode=block" filter is deprecated
    # in modern browsers (removed from Chromium, never in Firefox). "0" explicitly disables
    # the filter to avoid false-positive XSS-Auditor behavior. Use CSP instead.
    add_header X-XSS-Protection       "0" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    # HSTS: enable in TLS/SSL server block (see commented block below)

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/argus_access.log;
    error_log  /var/log/nginx/argus_error.log warn;

    # ── Auth endpoints (stricter rate limit) ─────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;

        add_header Access-Control-Allow-Origin  $cors_allow_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Tenant-ID, X-Admin-Key" always;
        add_header Access-Control-Max-Age       "7200" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://argus_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-API-Key         "change-me";
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── SSE support for scan events (long-lived connections) ─────────
    # IMPORTANT:
    # Do NOT use `location /api/v1/scans/` here: nginx then auto-redirects
    # `/api/v1/scans` -> `/api/v1/scans/` (301), while FastAPI redirects back
    # `/api/v1/scans/` -> `/api/v1/scans` (307). Behind Vercel/Cloudflare this
    # causes a redirect loop and the browser reports `Failed to fetch`.
    # Match only the SSE endpoint shape.
    location ~ ^/api/v1/scans/[^/]+/events$ {
        limit_req zone=api burst=50 nodelay;

        add_header Access-Control-Allow-Origin  $cors_allow_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Tenant-ID, X-Admin-Key" always;
        add_header Access-Control-Max-Age       "7200" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://argus_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-API-Key         "change-me";
        proxy_set_header   Connection        '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── General API proxy ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        add_header Access-Control-Allow-Origin  $cors_allow_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Tenant-ID, X-Admin-Key" always;
        add_header Access-Control-Max-Age       "7200" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://argus_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-API-Key         "change-me";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (docker healthcheck: wget http://localhost/health) ─
    location /health {
        proxy_pass http://argus_backend/api/v1/health;
        proxy_set_header Host $host;
    }

    # ── Default catch-all ────────────────────────────────────────────
    location / {
        return 404;
    }
}

