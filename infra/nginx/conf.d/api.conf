# ARGUS — API reverse proxy to backend
# Health: /health -> backend /api/v1/health
# API: /api -> backend /api
# Rate limit: 10 req/s per IP (burst 20)
# CORS: enabled for /api/
#
# Dynamic DNS: resolver + variable in proxy_pass host re-resolves backend after container recreate.
# IMPORTANT: do not use `proxy_pass http://$host/api/;` — with a variable, nginx skips the
# location→URI rewrite and can forward only `/api/` → FastAPI 404. Use `$request_uri` instead.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Docker embedded DNS — short TTL so nginx picks up new backend container IP after rebuild
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $argus_backend_host backend:8000;

    client_max_body_size 50M;

    location = /health {
        proxy_pass http://$argus_backend_host/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-Admin-Key" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-Admin-Key";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        proxy_pass http://$argus_backend_host$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://$argus_backend_host$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
