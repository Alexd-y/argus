# ARGUS Development overrides — auto-loaded when running from infra/
# Port exposure for local tools, backend hot-reload
# Usage: docker compose up (from infra/ — override is loaded automatically)

services:
  postgres:
    ports:
      # Host port from .env (default 5432). On Windows, if bind fails with
      # "forbidden by its access permissions", set POSTGRES_PORT=5433 in .env.
      - "${POSTGRES_PORT:-5432}:5432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    ports:
      - "6379:6379"

  backend:
    command:
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-include
      - "*.py"
      - --reload-exclude
      - "data/*"
      - --reload-exclude
      - "tests/*"
      - --reload-exclude
      - "alembic/*"
      - --reload-exclude
      - "__pycache__/*"
      - --reload-exclude
      - ".pytest_cache/*"
      - --reload-delay
      - "2.0"
    volumes:
      - ../backend:/app
    environment:
      LOG_LEVEL: DEBUG
      SANDBOX_ENABLED: "true"

  sandbox:
    volumes:
      - ../plugins/exploit_scripts:/opt/exploit_scripts:ro
